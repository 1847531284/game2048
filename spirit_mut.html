<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>зІҫзҒөж–№иҲҹпјҡеҸҳејӮ</title>
  <style>
    :root {
      --bg: #161024;
      --panel: #241a3a;
      --panel-light: #2f2350;
      --text: #f3e8ff;
      --muted: #b8a8d8;
      --accent: #b026ff;
      --accent-soft: #d96eff;
      --danger: #ff3d7f;
      --gold: #ffd166;
      --toxic: #9ef916;
      --radius: 14px;
      --shadow: 0 12px 30px rgba(0,0,0,0.45);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      background:
        radial-gradient(circle at 15% 12%, rgba(176,38,255,0.14) 0%, transparent 42%),
        radial-gradient(circle at 85% 88%, rgba(217,110,255,0.10) 0%, transparent 42%),
        var(--bg);
      color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      overflow-x: hidden;
      min-height: 100%;
    }
    h1, h2, h3 { font-family: 'Songti SC', 'STSong', 'SimSun', 'Noto Serif SC', serif; margin: 0; }

    /* йҖҡз”ЁжҢүй’® */
    .btn {
      background: linear-gradient(135deg, var(--accent), #7a18b8);
      border: none; border-radius: 12px; padding: 12px 26px;
      font-size: 15px; font-weight: 700; color: #fff; cursor: pointer;
      box-shadow: 0 6px 16px rgba(176,38,255,0.30);
      transition: transform .1s, filter .2s;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
    .btn:active { transform: translateY(0); }
    .btn.secondary { background: var(--panel-light); color: var(--text); box-shadow: none; }
    .btn.ghost { background: transparent; border: 1px solid rgba(217,110,255,0.4); color: var(--accent-soft); box-shadow: none; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }
    .btn.danger { background: linear-gradient(135deg, var(--danger), #b8264f); }

    .btn-icon {
      background: var(--panel); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); border-radius: 10px; width: 38px; height: 38px;
      display: grid; place-items: center; cursor: pointer; font-size: 16px;
      transition: transform .1s, background .2s;
    }
    .btn-icon:hover { background: var(--panel-light); }
    .btn-icon:active { transform: scale(0.94); }

    /* ејҖе§ӢиҸңеҚ• */
    .menu-overlay {
      position: fixed; inset: 0;
      background:
        radial-gradient(circle at 30% 20%, rgba(176,38,255,0.18) 0%, transparent 50%),
        var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 300; padding: 20px; overflow-y: auto;
    }
    .menu-box {
      width: min(480px, 96vw);
      background: var(--panel);
      border-radius: 22px; padding: 28px;
      box-shadow: var(--shadow); text-align: center;
      border: 1px solid rgba(217,110,255,0.18);
    }
    .menu-box h1 { font-size: 34px; color: var(--accent-soft); letter-spacing: 3px; }
    .menu-box .subtitle { color: var(--muted); font-size: 13px; margin: 8px 0 22px; }
    .menu-section { margin: 16px 0; text-align: left; }
    .menu-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .option-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .option-btn {
      flex: 1; min-width: 70px;
      background: var(--panel-light); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); border-radius: 10px; padding: 10px 12px;
      cursor: pointer; font-size: 14px; font-weight: 600;
      transition: background .2s, border-color .2s;
    }
    .option-btn:hover { background: rgba(217,110,255,0.10); }
    .option-btn.selected { border-color: var(--accent); background: rgba(176,38,255,0.18); color: var(--accent-soft); }
    .menu-desc { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
    .menu-actions { margin-top: 22px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    /* йЎ¶йғЁж Ҹ */
    .topbar {
      width: min(580px, 98vw);
      margin-top: 8px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .topbar .title { font-size: 18px; font-weight: 700; color: var(--accent-soft); }
    .topbar .zone-name { color: var(--muted); font-size: 13px; }
    .topbar-actions { display: flex; gap: 6px; }

    /* HUD */
    .hud {
      width: min(580px, 98vw);
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      margin-top: 10px;
    }
    .hud-card {
      background: var(--panel); border-radius: 12px; padding: 8px 6px; text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .hud-card .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .hud-card .value { font-size: 18px; font-weight: 800; color: var(--text); margin-top: 2px; }
    .hud-card .value.accent { color: var(--accent-soft); }
    .hud-card .value.gold { color: var(--gold); }
    .hud-card .value.toxic { color: var(--toxic); }

    /* д»»еҠЎйқўжқҝ */
    .task-panel {
      width: min(580px, 98vw);
      background: var(--panel); border-radius: 12px; padding: 10px 12px;
      margin-top: 10px; border: 1px solid rgba(255,255,255,0.06);
    }
    .task-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 0; }
    .task-row .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .task-row.done .dot { background: var(--toxic); }
    .task-row.done { color: var(--muted); text-decoration: line-through; }

    /* з—…жҜ’жҪ®иҝӣеәҰжқЎ */
    .wave-bar-wrap {
      width: min(580px, 98vw);
      margin-top: 10px;
      background: var(--panel); border-radius: 10px; padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .wave-bar-label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
    .wave-bar { height: 8px; background: var(--panel-light); border-radius: 4px; overflow: hidden; margin-top: 4px; }
    .wave-bar-fill { height: 100%; background: linear-gradient(90deg, var(--danger), var(--accent)); transition: width .3s; }

    /* жЈӢзӣҳ */
    .board-wrap {
      width: min(560px, 94vw);
      margin-top: 12px;
      background: var(--panel); border-radius: 16px; padding: 10px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(217,110,255,0.14);
      position: relative;
    }
    .board {
      display: grid; gap: 6px;
      width: 100%;
      touch-action: none;
    }
    .cell {
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: rgba(0,0,0,0.25);
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
      user-select: none;
    }
    .cell .v { font-size: 20px; font-weight: 900; line-height: 1; }
    .cell .name { font-size: 9px; color: rgba(255,255,255,0.85); margin-top: 3px; line-height: 1; }
    .cell .hp { font-size: 10px; font-weight: 800; color: var(--toxic); position: absolute; top: 3px; right: 4px; }
    .cell .tag { font-size: 13px; position: absolute; top: 2px; left: 3px; }
    .cell.next-virus {
      box-shadow: inset 0 0 0 2px var(--danger);
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .cell.selectable { cursor: pointer; box-shadow: inset 0 0 0 2px var(--accent-soft); }

    /* йўңиүІж ·ејҸ */
    .tile-red { background: linear-gradient(135deg, #ff4d6d, #c9184a); color: #fff; }
    .tile-green { background: linear-gradient(135deg, #9ef916, #6bb800); color: #1a2a00; }
    .tile-blue { background: linear-gradient(135deg, #4cc9f0, #2779a3); color: #fff; }
    .tile-yellow { background: linear-gradient(135deg, #ffd166, #d4a017); color: #4a3a00; }
    .tile-purple { background: linear-gradient(135deg, #b026ff, #6a0dad); color: #fff; }
    .tile-gold {
      background: linear-gradient(135deg, #ffd166, #ff9e00, #ffd166);
      color: #4a3a00; box-shadow: 0 0 12px rgba(255,209,102,0.5);
    }
    .tile-virus {
      background: linear-gradient(135deg, #2a0a1a, #5a0a2a);
      color: var(--danger); border: 1px solid var(--danger);
    }
    .tile-virus .v { color: var(--danger); }

    /* жҠҖиғҪж Ҹ */
    .skills {
      width: min(580px, 98vw);
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      margin-top: 12px; margin-bottom: 16px;
    }
    .skill-card {
      background: var(--panel); border-radius: 12px; padding: 10px 6px; text-align: center;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.06);
      transition: transform .1s, border-color .2s, background .2s;
    }
    .skill-card:hover { background: var(--panel-light); }
    .skill-card:active { transform: scale(0.96); }
    .skill-card.active { border-color: var(--accent-soft); background: rgba(176,38,255,0.18); }
    .skill-card.disabled { opacity: 0.45; cursor: not-allowed; }
    .skill-card .icon { font-size: 22px; }
    .skill-card .name { font-size: 12px; font-weight: 700; margin-top: 4px; }
    .skill-card .cost { font-size: 11px; color: var(--accent-soft); margin-top: 2px; }
    .skill-card .cost.cant { color: var(--danger); }

    /* еј№зӘ— */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(10,5,20,0.78);
      display: none; align-items: center; justify-content: center; z-index: 400; padding: 16px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      width: min(440px, 96vw); max-height: 88vh; overflow-y: auto;
      background: var(--panel); border-radius: 18px; padding: 22px;
      box-shadow: var(--shadow); border: 1px solid rgba(217,110,255,0.2);
      text-align: center;
    }
    .modal h2 { font-size: 22px; color: var(--accent-soft); margin-bottom: 8px; }
    .modal p { color: var(--muted); font-size: 14px; line-height: 1.6; margin: 6px 0; }
    .modal .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 14px; }
    .modal .stat-row .v { color: var(--accent-soft); font-weight: 700; }
    .modal-actions { margin-top: 18px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    /* иҝӣеҢ–йҖүжӢ© */
    .evo-options { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
    .evo-card {
      flex: 1; min-width: 130px; background: var(--panel-light); border-radius: 12px; padding: 14px;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.08); text-align: center;
      transition: transform .1s, border-color .2s;
    }
    .evo-card:hover { transform: translateY(-2px); border-color: var(--accent-soft); }
    .evo-card .icon { font-size: 28px; }
    .evo-card .name { font-weight: 700; margin-top: 6px; color: var(--accent-soft); }
    .evo-card .desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

    /* иүІжқҝ */
    .palette { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
    .palette-btn {
      width: 56px; height: 56px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1);
      cursor: pointer; font-size: 22px; display: grid; place-items: center; color: #fff; font-weight: 800;
    }
    .palette-btn:hover { transform: scale(1.06); }

    /* е•Ҷеә— */
    .shop-card {
      background: var(--panel-light); border-radius: 12px; padding: 12px; margin: 8px 0;
      display: flex; align-items: center; gap: 10px; text-align: left;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .shop-card .icon { font-size: 24px; }
    .shop-card .info { flex: 1; }
    .shop-card .info .name { font-weight: 700; }
    .shop-card .info .desc { font-size: 12px; color: var(--muted); }
    .shop-card .info .lvl { font-size: 11px; color: var(--accent-soft); }

    /* её®еҠ© */
    .help-content { text-align: left; }
    .help-content h3 { color: var(--accent-soft); font-size: 15px; margin: 14px 0 6px; }
    .help-content p, .help-content li { font-size: 13px; color: var(--text); line-height: 1.6; }
    .help-content ul { margin: 4px 0 4px 18px; padding: 0; }
    .help-content .example { background: var(--panel-light); border-radius: 8px; padding: 8px 10px; margin: 6px 0; font-size: 13px; }
    .help-content table { width: 100%; border-collapse: collapse; margin: 6px 0; }
    .help-content td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 13px; }
    .color-chip { display: inline-block; width: 14px; height: 14px; border-radius: 4px; vertical-align: middle; margin-right: 4px; }

    /* жҺ’иЎҢжҰң */
    .lb-row { display: flex; justify-content: space-between; padding: 8px 6px; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
    .lb-row .rank { color: var(--gold); font-weight: 800; width: 28px; }
    .lb-row .nm { flex: 1; text-align: left; }
    .lb-row .sc { color: var(--accent-soft); font-weight: 700; }

    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--panel-light); color: var(--text); padding: 10px 18px;
      border-radius: 10px; font-size: 14px; z-index: 500;
      box-shadow: var(--shadow); opacity: 0; transition: opacity .25s; pointer-events: none;
      border: 1px solid rgba(217,110,255,0.3);
    }
    .toast.show { opacity: 1; }

    input.name-input {
      background: var(--panel-light); border: 1px solid rgba(217,110,255,0.3); color: var(--text);
      border-radius: 8px; padding: 10px 14px; font-size: 15px; width: 100%; margin-top: 10px;
    }
    .skill-hint {
      width: min(580px,98vw); text-align: center; font-size: 12px; color: var(--accent-soft);
      margin-top: 6px; min-height: 16px;
    }
  </style>
</head>
<body>

  <!-- ејҖе§ӢиҸңеҚ• -->
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-box">
      <h1>зІҫзҒөж–№иҲҹпјҡеҸҳејӮ</h1>
      <div class="subtitle">зҙ«йӣҫз¬јзҪ©ж–№иҲҹпјҢеҹәеӣ еңЁз—…жҜ’жҪ®дёӯзӘҒеҸҳжұӮз”ҹ</div>

      <div class="menu-section">
        <div class="menu-label">йҡҫеәҰйҖүжӢ©</div>
        <div class="option-row" id="diffOptions">
          <button class="option-btn" data-diff="easy">иҪ»жқҫ</button>
          <button class="option-btn selected" data-diff="normal">жҷ®йҖҡ</button>
          <button class="option-btn" data-diff="hard">еӣ°йҡҫ</button>
        </div>
        <div class="menu-desc" id="diffDesc">жҷ®йҖҡпјҡз—…жҜ’жҜҸ8еӣһеҗҲеҮәзҺ°пјҢеҹәзЎҖиЎҖйҮҸ2</div>
      </div>

      <div class="menu-section">
        <div class="menu-label">жЈӢзӣҳеӨ§е°Ҹ</div>
        <div class="option-row" id="sizeOptions">
          <button class="option-btn" data-size="4">4Г—4</button>
          <button class="option-btn selected" data-size="5">5Г—5</button>
          <button class="option-btn" data-size="6">6Г—6</button>
        </div>
        <div class="menu-desc" id="sizeDesc">5Г—5пјҡжӣҙеӨ§з©әй—ҙпјҢжӣҙеӨҡзӯ–з•Ҙ</div>
      </div>

      <div class="menu-actions">
        <button class="btn" id="btnStart">ејҖе§ӢжёёжҲҸ</button>
        <button class="btn secondary" id="btnContinue">з»§з»ӯдёҠж¬Ў</button>
      </div>
      <div class="menu-actions">
        <button class="btn ghost" id="btnHelp">зҺ©жі•иҜҙжҳҺ</button>
        <button class="btn ghost" id="btnLB">жҺ’иЎҢжҰң</button>
        <button class="btn ghost" id="btnShop">ж ·жң¬е•Ҷеә—</button>
        <button class="btn ghost" id="btnCloud">вҳҒпёҸ дә‘еҗҢжӯҘ</button>
      </div>
    </div>
  </div>

  <!-- жёёжҲҸз•Ңйқў -->
  <div id="gameView" style="display:none;">
    <div class="topbar">
      <div>
        <div class="title">зІҫзҒөж–№иҲҹпјҡеҸҳејӮ</div>
        <div class="zone-name" id="zoneName">жұЎжҹ“еҢә Оұ</div>
      </div>
      <div class="topbar-actions">
        <button class="btn-icon" id="btnCloud2" title="дә‘еҗҢжӯҘ">вҳҒпёҸ</button>
        <button class="btn-icon" id="btnRestart" title="йҮҚеҗҜжң¬еҢә">вҶә</button>
        <button class="btn-icon" id="btnMenu" title="дё»иҸңеҚ•">вҳ°</button>
        <button class="btn-icon" id="btnHelp2" title="зҺ©жі•иҜҙжҳҺ">?</button>
      </div>
    </div>

    <div class="hud">
      <div class="hud-card"><div class="label">еҸҳејӮеҲҶ</div><div class="value accent" id="hudScore">0</div></div>
      <div class="hud-card"><div class="label">еҹәеӣ иғҪ</div><div class="value toxic" id="hudEnergy">0</div></div>
      <div class="hud-card"><div class="label">еҢәеҹҹ</div><div class="value gold" id="hudZone">1/8</div></div>
      <div class="hud-card"><div class="label">йҡҫеәҰ</div><div class="value" id="hudDiff">жҷ®йҖҡ</div></div>
    </div>

    <div class="task-panel" id="taskPanel"></div>

    <div class="wave-bar-wrap">
      <div class="wave-bar-label"><span>з—…жҜ’жҪ®иҝӣеәҰ</span><span id="waveText">0 / 0</span></div>
      <div class="wave-bar"><div class="wave-bar-fill" id="waveFill" style="width:0%"></div></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="skill-hint" id="skillHint"></div>

    <div class="skills" id="skills"></div>
  </div>

  <!-- йҖҡз”Ёеј№зӘ— -->
  <div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
  <div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   зІҫзҒөж–№иҲҹпјҡеҸҳејӮ  вҖ”вҖ” еҚ•ж–Үд»¶ HTML5 жёёжҲҸ
   зҙ«иүІеҸҳејӮдё»йўҳпјҡеҗҲе№¶еҹәеӣ гҖҒеҜ№жҠ—з—…жҜ’жҪ®гҖҒеҲҶеҢ–иҝӣеҢ–
   ============================================================ */

/* ---------- еёёйҮҸе®ҡд№ү ---------- */

// з—…жҜ’з”ҹжҲҗй—ҙйҡ”пјҲжҜҸNеӣһеҗҲз”ҹжҲҗ1дёӘпјүвҖ”вҖ” еүҠејұеҗҺпјҡжҜ”еҺҹзүҲ+2еӣһеҗҲ
const VIRUS_INTERVAL = { easy: 10, normal: 8, hard: 6 };
// з—…жҜ’еҹәзЎҖиЎҖйҮҸ вҖ”вҖ” еүҠејұеҗҺпјҡжҜ”еҺҹзүҲ-1
const VIRUS_BASE_HP = { easy: 2, normal: 2, hard: 3 };

// йҡҫеәҰжҸҸиҝ°
const DIFF_DESC = {
  easy: 'иҪ»жқҫпјҡз—…жҜ’жҜҸ10еӣһеҗҲеҮәзҺ°пјҢеҹәзЎҖиЎҖйҮҸ2пјҢжіўж¬Ўжӣҙе°‘',
  normal: 'жҷ®йҖҡпјҡз—…жҜ’жҜҸ8еӣһеҗҲеҮәзҺ°пјҢеҹәзЎҖиЎҖйҮҸ2',
  hard: 'еӣ°йҡҫпјҡз—…жҜ’жҜҸ6еӣһеҗҲеҮәзҺ°пјҢеҹәзЎҖиЎҖйҮҸ3пјҢжіўж¬ЎжӣҙеӨҡ'
};

// жЈӢзӣҳеӨ§е°ҸжҸҸиҝ°

// иҜ»еҸ–еҚҮзә§зӯүзә§
function getUpgradeLevels() {
  try {
    const raw = localStorage.getItem('ark_mut_upgrades');
    if (!raw) return { energy: 0, culture: 0, resist: 0, affinity: 0 };
    return Object.assign({ energy: 0, culture: 0, resist: 0, affinity: 0 }, JSON.parse(raw));
  } catch (e) {
    return { energy: 0, culture: 0, resist: 0, affinity: 0 };
  }
}

// иҜ»еҸ–ж ·жң¬дҪҷйўқ
function getEssence() {
  return parseInt(localStorage.getItem('ark_mut_essence') || '0', 10);
}
function addEssence(n) {
  localStorage.setItem('ark_mut_essence', String(getEssence() + n));
}

// жө®еұӮжҸҗзӨә
function toast(msg) {

  el.classList.add('show');
  clearTimeout(toast._t);

// зү©з§ҚеҗҚ
function speciesName(value) {
  if (SPECIES_NAMES[value]) return SPECIES_NAMES[value];
  return 'з”ҹе‘ҪдҪ“';
}

// и®Ўз®—з”ҹзү©жңҖеӨ§иЎҖйҮҸ
function computeMaxHp(value, tag) {
  const resist = getUpgradeLevels().resist || 0;
  let hp = Math.max(1, Math.floor(Math.log2(value))) + resist;
  if (tag === 'shield') hp += 2;
  return hp;
}

// еҲӣе»әз”ҹзү©ж–№еқ—
function createCell(value, color, tag) {
  const hp = computeMaxHp(value, tag);
  return { id: ++cellIdCounter, type: 'creature', value: value, color: color, hp: hp, maxHp: hp, tag: tag || null };
}

// еҲӣе»әз—…жҜ’ж–№еқ—
function createVirus(hp) {
  return { id: ++cellIdCounter, type: 'virus', hp: hp, maxHp: hp };
}

// еҲӣе»әз©әжЈӢзӣҳ
function createEmptyBoard(size) {
  const b = [];
  for (let r = 0; r < size; r++) {
    const row = [];
    for (let c = 0; c < size; c++) row.push(null);
    b.push(row);
  }
  return b;
}

// жЈӢзӣҳеәҸеҲ—еҢ–еҝ«з…§пјҲз”Ёеӯ—з¬ҰдёІжЈҖжөӢеҸҳеҢ–пјҢйҒҝе…ҚеҜ№иұЎеј•з”ЁжҜ”иҫғBugпјү
function serializeBoard(cells) {
  let s = '';
  for (let r = 0; r < cells.length; r++) {
    for (let c = 0; c < cells[r].length; c++) {
      const cell = cells[r][c];
      if (!cell) { s += '.'; }
      else if (cell.type === 'virus') { s += 'V' + cell.hp + ','; }
      else { s += cell.color[0] + cell.value + 'h' + cell.hp + 't' + (cell.tag || '') + ';'; }
    }
    s += '|';
  }
  return s;
}

// иҺ·еҸ–еӣӣйӮ»ж ј
function getNeighbors(r, c) {
  const res = [];
  if (r > 0) res.push([r - 1, c]);
  if (r < state.size - 1) res.push([r + 1, c]);
  if (c > 0) res.push([r, c - 1]);
  if (c < state.size - 1) res.push([r, c + 1]);
  return res;
}

// ж”¶йӣҶжүҖжңүз©әж ј
function getEmptyCells() {
  const arr = [];
  for (let r = 0; r < state.size; r++)
    for (let c = 0; c < state.size; c++)
      if (!board[r][c]) arr.push([r, c]);
  return arr;
}

/* ---------- еҗҲе№¶йҖ»иҫ‘пјҲж ёеҝғпјү ---------- */

// еҲӨж–ӯдёӨдёӘз”ҹзү©жҳҜеҗҰеҸҜеҗҲе№¶
function canMerge(a, b) {
  if (!a || !b || a.type !== 'creature' || b.type !== 'creature') return false;
  if (a.value !== b.value) return false;
  if (a.color === b.color) return true;            // еҗҢиүІеҗҢеҖј
  const key = a.color + '|' + b.color;
  if (PAIR_TABLE[key]) return true;                // й…ҚеҜ№иЎЁејӮиүІ
  if (a.color === 'purple' || b.color === 'purple') return true; // зҙ«еҹәеӣ зӘҒеҸҳ
  return false; // е…¶д»–ејӮиүІпјҲзәў+з»ҝзӯүпјүдёҚеҸҜеҗҲе№¶
}

// жү§иЎҢеҗҲе№¶пјҲеҗҢиүІ/й…ҚеҜ№иЎЁпјү
function doMerge(a, b) {
  const parentTag = a.tag || b.tag || null; // еҗҲе№¶дә§зү©з»§жүҝзҲ¶д»Јtag
  let nv, color;
  if (a.color === b.color) {
    // еҗҢиүІеҗҲе№¶пјҡГ—2еҚҮдёҖзә§пјҢиүІдёҚеҸҳ
    nv = a.value * 2;
    color = a.color;
    state.score += nv;
    state.energy += Math.floor(nv / 10);
  } else {
    const key = a.color + '|' + b.color;
    if (PAIR_TABLE[key]) {
      // й…ҚеҜ№иЎЁеҗҲе№¶пјҡжҢүиЎЁеҗҲжҲҗ
      const entry = PAIR_TABLE[key];
      nv = a.value * entry.mult;
      color = entry.color;
      state.score += nv;
    } else if (a.color === 'purple' || b.color === 'purple') {
      // зҙ«еҹәеӣ зӘҒеҸҳ
      return doMutate(a, b, parentTag);
    } else {
      return null; // дёҚеә”еҲ°иҫҫ
    }
  }
  return createCell(nv, color, parentTag);
}

// зҙ«еҹәеӣ зӘҒеҸҳпјҲзҙ«+е…¶д»–еҗҢеҖјиүІпјҢдёҚеңЁй…ҚеҜ№иЎЁдёӯпјүвҖ”вҖ” йҷҚдҪҺзҙ«еҢ–жҰӮзҺҮ
function doMutate(a, b, inheritedTag) {
  let chaosBonus = 0;
  if (a.tag === 'chaos' || b.tag === 'chaos') chaosBonus += 0.20; // еҺҹ0.30ж”№0.20
  const aff = getUpgradeLevels().affinity || 0;
  const rate = Math.min(0.65, 0.25 + chaosBonus + aff * 0.05); // еҺҹ0.5еҹәзЎҖж”№0.25пјҢдёҠйҷҗ0.95ж”№0.65
  let nv, color;
  if (Math.random() < rate) {
    nv = a.value * 4; color = 'purple';   // зӘҒеҸҳжҲҗеҠҹпјҡГ—4еҸҳзҙ«
  } else {
    nv = a.value * 2;                      // зӘҒеҸҳеӨұиҙҘпјҡГ—2
    // еӨұиҙҘж—¶дҝқжҢҒе…¶дёӯдёҖдёӘзҲ¶д»ЈйўңиүІпјҲиҖҢйқһйҡҸжңәеҸҳиүІпјү
    color = (Math.random() < 0.5) ? a.color : b.color;
  }
  state.score += nv;
  return createCell(nv, color, inheritedTag);
}

/* ---------- ж»‘еҠЁз®—жі• ---------- */

// ж®өеҶ…еҺӢзј©+еҗҲе№¶пјҲиҝһй”ҒеҸҚеә”пјҡеҗҲе№¶дә§зү©еҸҜдёҺдёӢдёҖдёӘз»§з»ӯеҗҲе№¶пјү
function compactAndMerge(cells) {
  const filtered = cells.filter(c => c !== null);
  const result = [];
  let i = 0;
  while (i < filtered.length) {
    let current = filtered[i];
    let j = i + 1;
    while (j < filtered.length && canMerge(current, filtered[j])) {
      current = doMerge(current, filtered[j]);
      j++;
    }
    result.push(current);
    i = j;
  }
  return result; // еҺӢзј©еҗҺж•°з»„пјҲеҸҜиғҪзҹӯдәҺиҫ“е…Ҙпјү
}

// еӨ„зҗҶдёҖиЎҢ/дёҖеҲ—зҡ„ж»‘еҠЁпјҲvirus дҪңдёәеўҷеҲҮеҲҶж®өпјү
// dir: 'forward' жңқзҙўеј•0еҺӢзј©пјҢ'backward' жңқжң«з«ҜеҺӢзј©
function slideLine(line, dir) {
  const n = line.length;
  const work = dir === 'forward' ? line.slice() : line.slice().reverse();
  const result = new Array(n).fill(null);
  let segStart = 0;
  for (let i = 0; i <= n; i++) {
    const isBoundary = (i === n) || (work[i] && work[i].type === 'virus');
    if (isBoundary) {
      const segCells = [];
      for (let k = segStart; k < i; k++) if (work[k]) segCells.push(work[k]);
      const merged = compactAndMerge(segCells);
      for (let k = 0; k < merged.length; k++) result[segStart + k] = merged[k];
      if (i < n && work[i] && work[i].type === 'virus') {
        result[i] = work[i]; // з—…жҜ’дҪңдёәеўҷдҝқз•ҷеҺҹдҪҚ
        segStart = i + 1;
      }
    }
  }
  return dir === 'forward' ? result : result.reverse();
}

// дё»ж»‘еҠЁе…ҘеҸЈ
function slide(direction) {
  if (skillMode) return; // жҠҖиғҪжЁЎејҸдёӢзҰҒжӯўж»‘еҠЁ
  const before = serializeBoard(board);
  const size = state.size;

  if (direction === 'left' || direction === 'right') {
    const dir = direction === 'left' ? 'forward' : 'backward';
    for (let r = 0; r < size; r++) board[r] = slideLine(board[r], dir);
  } else {
    const dir = direction === 'up' ? 'forward' : 'backward';
    for (let c = 0; c < size; c++) {
      const col = [];
      for (let r = 0; r < size; r++) col.push(board[r][c]);
      const newCol = slideLine(col, dir);
      for (let r = 0; r < size; r++) board[r][c] = newCol[r];
    }
  }

  const after = serializeBoard(board);
  if (before === after) return; // ж— еҸҳеҢ–пјҢдёҚи®ЎеӣһеҗҲ

  // жңүеҸҳеҢ–жүҚз”ҹжҲҗж–°з”ҹзү© + жЈҖжҹҘиҝӣеҢ– + afterSlide
  spawnCreature();
  findAndQueueEvolutions();
  if (pendingEvolutions.length > 0) {
    showEvolution(() => afterSlide());
  } else {
    afterSlide();
  }
}

// з”ҹжҲҗж–°з”ҹзү©пјҲ90% Lv2пјҢ10% Lv4пјҢ4иүІйҡҸжңәпјү
function spawnCreature() {
  const empties = getEmptyCells();
  if (empties.length === 0) return;
  const pos = empties[Math.floor(Math.random() * empties.length)];
  const value = Math.random() < 0.1 ? 4 : 2;
  const color = SPAWN_COLORS[Math.floor(Math.random() * SPAWN_COLORS.length)];
  board[pos[0]][pos[1]] = createCell(value, color);
}

/* ---------- иҝӣеҢ–зі»з»ҹ ---------- */

// жү«жҸҸжЈӢзӣҳпјҢжүҫеҮә LvвүҘ16 дё”ж—  tag дё”жңӘжҸҗзӨәиҝҮзҡ„з”ҹзү©пјҢеҠ е…Ҙеҫ…еҲҶеҢ–йҳҹеҲ—
function findAndQueueEvolutions() {
  for (let r = 0; r < state.size; r++) {
    for (let c = 0; c < state.size; c++) {
      const cell = board[r][c];
      if (!cell || cell.type !== 'creature') continue;
      if (cell.value >= 16 && !cell.tag && !evolutionOfferedIds.has(cell.id)) {
        if (EVOLUTIONS[cell.color]) {
          evolutionOfferedIds.add(cell.id);
          pendingEvolutions.push({ r: r, c: c, id: cell.id });
        }
      }
    }
  }
}

// дҫқж¬Ўеј№еҮәеҲҶеҢ–йҖүжӢ©еј№зӘ—
function showEvolution(onComplete) {
  if (pendingEvolutions.length === 0) { onComplete(); return; }
  const item = pendingEvolutions.shift();
  const cell = board[item.r][item.c];
  if (!cell || cell.id !== item.id || !EVOLUTIONS[cell.color]) {
    showEvolution(onComplete); // и·іиҝҮж— ж•ҲйЎ№
    return;
  }
  const options = EVOLUTIONS[cell.color];
  const html =
    '<h2>еҹәеӣ еҲҶеҢ–</h2>' +
    '<p>дёҖдёӘ <b style="color:' + COLOR_HEX[cell.color] + '">' + COLOR_ICON[cell.color] + ' ' + speciesName(cell.value) + '</b>пјҲLv' + cell.value + 'пјүе·ІжҲҗзҶҹпјҢиҜ·йҖүжӢ©еҲҶеҢ–ж–№еҗ‘пјҡ</p>' +
    '<div class="evo-options">' +
    options.map(o =>
      '<div class="evo-card" data-evo="' + o.key + '">' +
      '<div class="icon">' + o.icon + '</div>' +
      '<div class="name">' + o.name + '</div>' +
      '<div class="desc">' + o.desc + '</div>' +
      '</div>'
    ).join('') +
    '</div>';
  showModal(html, () => {
    const cards = document.querySelectorAll('.evo-card');
    cards.forEach(card => {
      card.onclick = () => {
        const key = card.getAttribute('data-evo');
        const opt = options.find(o => o.key === key);
        if (opt) {
          cell.tag = opt.key;
          // еә”з”ЁеҚіж—¶ж•Ҳжһң
          if (opt.key === 'shield') {
            cell.maxHp = computeMaxHp(cell.value, cell.tag);
            cell.hp = cell.maxHp;
          }
        }
        closeModal();
        showEvolution(onComplete); // еӨ„зҗҶдёӢдёҖдёӘ
      };
    });
  }, true); // ејәеҲ¶еј№зӘ—пјҢеҝ…йЎ»йҖүжӢ©еҲҶеҢ–ж–№еҗ‘
}

/* ---------- еӣһеҗҲеӨ„зҗҶ ---------- */

// ж»‘еҠЁеҗҺеӨ„зҗҶпјҡиў«еҠЁиғҪйҮҸ + ж Үзӯҫиў«еҠЁ + з—…жҜ’еӣһеҗҲ + жЈҖжҹҘ
function afterSlide() {
  state.energy += 3; // иў«еҠЁ+3пјҲеҺҹ+2ж”№+3пјү
  passivePhase();    // ж Үзӯҫиў«еҠЁж•Ҳжһң
  virusPhase();      // з—…жҜ’еӣһеҗҲ
  checkTasks();      // жЈҖжҹҘд»»еҠЎе®ҢжҲҗ
  if (state.tasks.every(t => t.done)) { onZoneComplete(); return; }
  if (isGameOver()) { onGameOver(); return; }
  updateForeseePos();
  render();
  save();
}

// ж Үзӯҫиў«еҠЁж•ҲжһңпјҲжҜҸеӣһеҗҲпјү
function passivePhase() {
  for (let r = 0; r < state.size; r++) {
    for (let c = 0; c < state.size; c++) {
      const cell = board[r][c];
      if (!cell || cell.type !== 'creature') continue;
      if (cell.tag === 'flame') state.energy += 1;
      if (cell.tag === 'energy') state.energy += 2;
      if (cell.tag === 'fungus') {
        const ns = getNeighbors(r, c);
        for (const p of ns) {
          if (!board[p[0]][p[1]]) {
            board[p[0]][p[1]] = createCell(2, cell.color);
            break; // д»…еҲҶиЈӮ1дёӘ
          }
        }
      }
      if (cell.tag === 'medicine') {
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr < 0 || nr >= state.size || nc < 0 || nc >= state.size) continue;
            const t = board[nr][nc];
            if (t && t.type === 'creature' && t.hp < t.maxHp) t.hp += 1;
          }
        }
      }
    }
  }
  // е…үз»ҶиғһпјҡжҜҸеӣһеҗҲжІ»ж„Ҳе…Ёеӣҫ1иЎҖ
  let hasLight = false;
  for (let r = 0; r < state.size && !hasLight; r++)
    for (let c = 0; c < state.size && !hasLight; c++) {
      const cell = board[r][c];
      if (cell && cell.type === 'creature' && cell.tag === 'light') hasLight = true;
    }
  if (hasLight) {
    for (let r = 0; r < state.size; r++)
      for (let c = 0; c < state.size; c++) {
        const cell = board[r][c];
        if (cell && cell.type === 'creature' && cell.hp < cell.maxHp) cell.hp += 1;
      }
  }
}

// з—…жҜ’еӣһеҗҲпјҡз”ҹжҲҗ + ж„ҹжҹ“ + жҠ—дҪ“еҸҚеҮ» + жё…зҗҶжӯ»дәЎ
function virusPhase() {
  state.turn++;
  const lvl = state.currentLevel;

  // з”ҹжҲҗз—…жҜ’пјҲжҜҸ N еӣһеҗҲпјү
  if (state.turn % lvl.interval === 0) {
    spawnVirus(lvl.baseHp);
    state.wavesSurvived++;
  }

  // ж„ҹжҹ“пјҡе…Ҳж”¶йӣҶжүҖжңүеҸ—ж„ҹжҹ“з”ҹзү©IDпјҲеҺ»йҮҚпјүпјҢеҶҚеҗ„-1пјҲеҚ•з”ҹзү©еҚ•еӣһеҗҲжңҖеӨҡ-1пјҢдёҚеҸ еҠ пјү
  const infectedIds = new Set();
  for (let r = 0; r < state.size; r++) {
    for (let c = 0; c < state.size; c++) {
      const cell = board[r][c];
      if (cell && cell.type === 'virus') {
        const ns = getNeighbors(r, c);
        for (const p of ns) {
          const nc = board[p[0]][p[1]];
          if (nc && nc.type === 'creature' && nc.tag !== 'tree') {
            infectedIds.add(nc.id); // еҺ»йҮҚ
          }
        }
      }
    }
  }
  for (let r = 0; r < state.size; r++) {
    for (let c = 0; c < state.size; c++) {
      const cell = board[r][c];
      if (cell && cell.type === 'creature' && infectedIds.has(cell.id)) {
        cell.hp -= 1;
      }
    }
  }

  // и“қеҹәеӣ жҠ—дҪ“еҸҚеҮ»пјҡзӣёйӮ»з—…жҜ’ж—¶пјҢиӢҘи“қеҹәеӣ зӯүзә§вүҘз—…жҜ’иЎҖйҮҸпјҢжҜҸеӣһеҗҲеҜ№з—…жҜ’+1дјӨе®іпјӣж”»з»ҶиғһйўқеӨ–+1
  const virusDmg = {}; // virusId -> жҖ»дјӨе®і
  for (let r = 0; r < state.size; r++) {
    for (let c = 0; c < state.size; c++) {
      const cell = board[r][c];
      if (cell && cell.type === 'creature' && cell.color === 'blue') {
        const ns = getNeighbors(r, c);
        for (const p of ns) {
          const nc = board[p[0]][p[1]];
          if (nc && nc.type === 'virus' && cell.value >= nc.hp) {
            let dmg = 1;
            if (cell.tag === 'attack') dmg += 1;
            virusDmg[nc.id] = (virusDmg[nc.id] || 0) + dmg;
          }
        }
      }
    }
  }
  const killedVirus = [];
  for (let r = 0; r < state.size; r++) {
    for (let c = 0; c < state.size; c++) {
      const cell = board[r][c];
      if (cell && cell.type === 'virus' && virusDmg[cell.id]) {
        cell.hp -= virusDmg[cell.id];
        if (cell.hp <= 0) killedVirus.push([r, c]);
      }
    }
  }

  // жё…зҗҶжӯ»дәЎз”ҹзү©
  for (let r = 0; r < state.size; r++) {
    for (let c = 0; c < state.size; c++) {
      const cell = board[r][c];
      if (cell && cell.type === 'creature' && cell.hp <= 0) {
        board[r][c] = null;
      }
    }
  }
  // жё…зҗҶиў«еҮ»жқҖз—…жҜ’ + еҘ–еҠұпјҲеҮ»жқҖ+8иғҪйҮҸ+80еҲҶпјү
  for (const p of killedVirus) {
    board[p[0]][p[1]] = null;
    state.energy += 8;
    state.score += 80;
  }
}

// з”ҹжҲҗз—…жҜ’пјҲдјҳе…ҲдҪҝз”Ёйў„иЁҖдҪҚзҪ®пјү
function spawnVirus(hp) {
  const empties = getEmptyCells();
  if (empties.length === 0) return;
  let pos = null;
  if (state.nextVirusPos) {
    const p = state.nextVirusPos;
    state.nextVirusPos = null;
    if (!board[p[0]][p[1]]) pos = p;
  }
  if (!pos) pos = empties[Math.floor(Math.random() * empties.length)];
  board[pos[0]][pos[1]] = createVirus(hp);
}

// йў„иЁҖиғһпјҡйў„зҹҘдёӢжіўз—…жҜ’дҪҚзҪ®пјҲд»…еҪ“еңәдёҠеӯҳеңЁйў„иЁҖиғһж—¶жҳҫзӨәпјү
function updateForeseePos() {
  state.nextVirusPos = null;
  let hasForesee = false;
  for (let r = 0; r < state.size && !hasForesee; r++)
    for (let c = 0; c < state.size && !hasForesee; c++) {
      const cell = board[r][c];
      if (cell && cell.type === 'creature' && cell.tag === 'foresee') hasForesee = true;
    }
  if (!hasForesee) return;
  const empties = getEmptyCells();
  if (empties.length > 0) {
    state.nextVirusPos = empties[Math.floor(Math.random() * empties.length)];
  }
}

// жҳҜеҗҰеӯҳеңЁйў„иЁҖиғһпјҲз”ЁдәҺжёІжҹ“ж Үи®°пјү
function hasForeseeCell() {
  for (let r = 0; r < state.size; r++)
    for (let c = 0; c < state.size; c++) {
      const cell = board[r][c];
      if (cell && cell.type === 'creature' && cell.tag === 'foresee') return true;
    }
  return false;
}

/* ---------- д»»еҠЎжЈҖжҹҘ ---------- */

function checkTasks() {
  for (const task of state.tasks) {
    if (task.done) continue;
    if (task.type === 'breed') {
      for (let r = 0; r < state.size; r++) {
        for (let c = 0; c < state.size; c++) {
          const cell = board[r][c];
          if (cell && cell.type === 'creature' && cell.color === task.color && cell.value >= task.value) {
            task.done = true;
            break;
          }
        }
        if (task.done) break;
      }
    } else if (task.type === 'survive') {
      if (state.wavesSurvived >= task.target) task.done = true;
    }
  }
}

// жҳҜеҗҰжёёжҲҸз»“жқҹпјҲжЈӢзӣҳж»Ўдё”ж— еҗҲе№¶еҸҜиғҪпјү
function isGameOver() {
  for (let r = 0; r < state.size; r++)
    for (let c = 0; c < state.size; c++)
      if (!board[r][c]) return false;
  for (let r = 0; r < state.size; r++) {
    for (let c = 0; c < state.size; c++) {
      const cell = board[r][c];
      if (cell && cell.type === 'creature') {
        if (c + 1 < state.size && canMerge(cell, board[r][c + 1])) return false;
        if (r + 1 < state.size && canMerge(cell, board[r + 1][c])) return false;
      }
    }
  }
  return true;
}

/* ---------- е…іеҚЎз”ҹжҲҗ ---------- */

function generateLevel(index) {
  const diff = state.difficulty;
  const interval = Math.max(3, VIRUS_INTERVAL[diff] - Math.floor(index / 3)); // еҺҹ/2ж”№/3
  const baseHp = VIRUS_BASE_HP[diff] + Math.floor(index / 3);                 // еҺҹ/2ж”№/3
  let waveTarget = 4 + index * 2;     // еҺҹ5+index*2ж”№4+index*2
  if (diff === 'hard') waveTarget += 2;
  if (diff === 'easy') waveTarget = Math.max(3, waveTarget - 1);
  if (state.size >= 6) waveTarget += 2; // 6Г—6жЈӢзӣҳ+2
  if (state.size === 5) waveTarget += 1; // 5Г—5жЈӢзӣҳ+1
  const breedSpec = BREED_TASKS[index] || BREED_TASKS[BREED_TASKS.length - 1];
  const tasks = [
    { type: 'breed', color: breedSpec.color, value: breedSpec.value, done: false, label: 'еҹ№иӮІ ' + COLOR_ICON[breedSpec.color] + ' Lv' + breedSpec.value + ' ' + speciesName(breedSpec.value) },
    { type: 'survive', target: waveTarget, done: false, label: 'жҠөеҫЎ ' + waveTarget + ' жіўз—…жҜ’жҪ®' }
  ];
  return { index: index, interval: interval, baseHp: baseHp, waveTarget: waveTarget, tasks: tasks };
}

// setupLevel жҺҘеҸ— opts.score/opts.energyпјҢstate еҝ…йЎ»жңү levelStartEnergy
function setupLevel(lvl, opts) {
  opts = opts || {};
  const diff = state.difficulty;
  state.zoneIndex = lvl.index;
  state.currentLevel = lvl;
  state.score = (opts.score !== undefined) ? opts.score : 0;
  const upgrades = getUpgradeLevels();
  state.energy = (opts.energy !== undefined) ? opts.energy : (40 + upgrades.energy * 20);
  state.levelStartScore = state.score;
  state.levelStartEnergy = state.energy;
  state.turn = 0;
  state.wavesSurvived = 0;
  state.tasks = lvl.tasks.map(t => Object.assign({}, t));
  state.skillUses = state.skillUses || { edit: 0, split: 0, antibody: 0, mutate: 0 };
  state.nextVirusPos = null;
  board = createEmptyBoard(state.size);

  // еҲқе§Ӣз”ҹзү©ж•°пјҡе…¬ејҸ = max(2, floor(sizeВІ/8)) + culture + (easy?1:0)
  const culture = upgrades.culture || 0;
  const initCount = Math.max(2, Math.floor(state.size * state.size / 8)) + culture + (diff === 'easy' ? 1 : 0);
  for (let i = 0; i < initCount; i++) spawnCreature();

  pendingEvolutions = [];
  evolutionOfferedIds = new Set();
  skillMode = null;
  render();
  save();
}

// loadLevel йҖҸдј  opts еҲ° setupLevel
function loadLevel(index, opts) {
  const lvl = generateLevel(index);
  setupLevel(lvl, opts);
}

// дёӢдёҖеҢә
function nextZone() {
  state.zoneIndex++;
  if (state.zoneIndex >= 8) { onGameComplete(); return; }
  loadLevel(state.zoneIndex, { energy: state.energy });
}

// йҮҚиҜ•еҪ“еүҚеҢә
function retryLevel() {
  loadLevel(state.zoneIndex, { score: state.levelStartScore, energy: state.levelStartEnergy });
}

/* ---------- еҢәеҹҹе®ҢжҲҗ / жёёжҲҸз»“жқҹ ---------- */

function onZoneComplete() {
  const levelScore = state.score - state.levelStartScore;
  const gained = Math.floor(levelScore / 1000);
  if (gained > 0) addEssence(gained);
  const isLast = state.zoneIndex >= 7;
  const html =
    '<h2>жұЎжҹ“еҢә ' + ZONE_NAMES[state.zoneIndex] + ' е·ІеҮҖеҢ–</h2>' +
    '<p>еҹәеӣ жұ зЁіе®ҡпјҢе№ёеӯҳз”ҹзү©е·ІйҖӮеә”зҺҜеўғгҖӮ</p>' +
    '<div class="stat-row"><span>жң¬еҢәеҫ—еҲҶ</span><span class="v">' + levelScore + '</span></div>' +
    '<div class="stat-row"><span>зҙҜи®ЎеҸҳејӮеҲҶ</span><span class="v">' + state.score + '</span></div>' +
    '<div class="stat-row"><span>иҺ·еҫ—ж ·жң¬</span><span class="v">рҹ’Һ ' + gained + '</span></div>' +
    '<div class="stat-row"><span>ж ·жң¬дҪҷйўқ</span><span class="v">рҹ’Һ ' + getEssence() + '</span></div>' +
    '<div class="modal-actions">' +
      (isLast
        ? '<button class="btn" id="btnFinishGame">е®ҢжҲҗж–№иҲҹ</button>'
        : '<button class="btn" id="btnNextZone">еүҚеҫҖдёӢдёҖеҢә</button>') +
      '<button class="btn secondary" id="btnShopModal">ж ·жң¬е•Ҷеә—</button>' +
    '</div>';
  showModal(html, () => {
    const bn = document.getElementById('btnNextZone');
    if (bn) bn.onclick = () => { closeModal(); nextZone(); };
    const bf = document.getElementById('btnFinishGame');
    if (bf) bf.onclick = () => { closeModal(); onGameComplete(); };
    const bs = document.getElementById('btnShopModal');
    if (bs) bs.onclick = () => { showShop(() => { onZoneComplete(); }); }; // е•Ҷеә—е…ій—ӯеҗҺйҮҚеј№з»“з®—
  }, true); // ејәеҲ¶еј№зӘ—пјҢдёҚеҸҜзӮ№йҒ®зҪ©е…ій—ӯ
}

function onGameComplete() {
  const html =
    '<h2>ж–№иҲҹйҮҚз”ҹ</h2>' +
    '<p>8дёӘжұЎжҹ“еҢәе…ЁйғЁеҮҖеҢ–пјҒзҙ«йӣҫж•ЈеҺ»пјҢз”ҹе‘Ҫе»¶з»ӯгҖӮ</p>' +
    '<div class="stat-row"><span>жңҖз»ҲеҸҳејӮеҲҶ</span><span class="v">' + state.score + '</span></div>' +
    '<div class="stat-row"><span>йҡҫеәҰ</span><span class="v">' + ({easy:'иҪ»жқҫ',normal:'жҷ®йҖҡ',hard:'еӣ°йҡҫ'}[state.difficulty]) + '</span></div>' +
    '<div class="stat-row"><span>жЈӢзӣҳ</span><span class="v">' + state.size + 'Г—' + state.size + '</span></div>' +
    '<p style="margin-top:12px;">еңЁжҺ’иЎҢжҰңз•ҷдёӢдҪ зҡ„еҗҚеӯ—пјҡ</p>' +
    '<input class="name-input" id="lbName" maxlength="12" placeholder="иҫ“е…ҘеҗҚеӯ—" />' +
    '<div class="modal-actions">' +
      '<button class="btn" id="btnSubmitLB">з•ҷеҗҚ</button>' +
      '<button class="btn secondary" id="btnBackMenu">иҝ”еӣһиҸңеҚ•</button>' +
    '</div>';
  showModal(html, () => {
    document.getElementById('btnSubmitLB').onclick = () => {
      const nm = (document.getElementById('lbName').value || 'еҢҝеҗҚж—…иҖ…').trim().slice(0, 12);
      submitLeaderboard(nm, state.score, state.zoneIndex + 1);
      closeModal();
      showLeaderboard(() => showMenu());
    };
    document.getElementById('btnBackMenu').onclick = () => { closeModal(); clearSave(); showMenu(); };
  }, true); // ејәеҲ¶еј№зӘ—
}

function onGameOver() {
  clearSave(); // жёёжҲҸз»“жқҹжё…еӯҳжЎЈпјҢйҒҝе…ҚеҲ·ж–°еҠ иҪҪжӯ»еұҖпјҲretryLevel з”ЁеҶ…еӯҳ stateпјҢдёҚеҸ—еҪұе“Қпјү
  const html =
    '<h2>ж–№иҲҹйҷ·иҗҪ</h2>' +
    '<p>еҹәеӣ жұ иў«з—…жҜ’еҗһжІЎпјҢе№ёеӯҳз”ҹзү©е·Іж— жі•е»¶з»ӯгҖӮ</p>' +
    '<div class="stat-row"><span>е·ІиҫҫеҢәеҹҹ</span><span class="v">' + ZONE_NAMES[state.zoneIndex] + 'пјҲз¬¬' + (state.zoneIndex + 1) + 'еҢәпјү</span></div>' +
    '<div class="stat-row"><span>еҸҳејӮеҲҶ</span><span class="v">' + state.score + '</span></div>' +
    '<div class="modal-actions">' +
      '<button class="btn" id="btnRetry">йҮҚиҜ•жң¬еҢә</button>' +
      '<button class="btn secondary" id="btnGOMenu">иҝ”еӣһиҸңеҚ•</button>' +
    '</div>';
  showModal(html, () => {
    document.getElementById('btnRetry').onclick = () => { closeModal(); retryLevel(); };
    document.getElementById('btnGOMenu').onclick = () => { closeModal(); showMenu(); };
  }, true); // ејәеҲ¶еј№зӘ—
}

/* ---------- жҠҖиғҪзі»з»ҹ ---------- */

function skillCost(skill) {
  const uses = (state.skillUses && state.skillUses[skill.key]) || 0;
  return Math.floor(skill.baseCost * Math.pow(1.5, uses)); // жҲҗжң¬йҖ’еўһ1.5еҖҚ
}

function onSkillClick(key) {
  const skill = SKILLS.find(s => s.key === key);
  if (!skill) return;
  const cost = skillCost(skill);
  if (state.energy < cost) { toast('иғҪйҮҸдёҚи¶і'); return; }
  if (skillMode) cancelSkillMode();
  state.energy -= cost;
  skillMode = key;
  if (key === 'antibody') {
    // жҠ—дҪ“жіЁе°„йңҖиҰҒйҖүзӣ®ж Үж јпјҲдёӯеҝғпјүпјҢз»ҷжҸҗзӨә
    toast('зӮ№йҖү3Г—3иҢғеӣҙдёӯеҝғж ј');
  } else if (key === 'edit') {
    toast('зӮ№йҖүиҰҒж”№иүІзҡ„з”ҹзү©');
  } else if (key === 'split') {
    toast('зӮ№йҖүLvвүҘ8з”ҹзү©еӨҚеҲ¶');
  } else if (key === 'mutate') {
    toast('зӮ№йҖүз”ҹзү©ејәеҲ¶зӘҒеҸҳ');
  }
  render();
}

function onCellClick(r, c) {
  if (!skillMode) return;
  const cell = board[r][c];
  if (skillMode === 'edit') {
    if (!cell || cell.type !== 'creature') { toast('иҜ·йҖүз”ҹзү©'); return; }
    selectedPalette = { r: r, c: c };
    showPaletteModal();
  } else if (skillMode === 'split') {
    if (!cell || cell.type !== 'creature' || cell.value < 8) { toast('йңҖйҖүLvвүҘ8з”ҹзү©'); return; }
    const ns = getNeighbors(r, c);
    for (const p of ns) {
      if (!board[p[0]][p[1]]) {
        board[p[0]][p[1]] = createCell(cell.value, cell.color, cell.tag);
        finishSkill();
        return;
      }
    }
    toast('е‘Ёеӣҙж— з©әж ј');
  } else if (skillMode === 'antibody') {
    // жё…йҷӨ3Г—3иҢғеӣҙеҶ…жүҖжңүз—…жҜ’
    let killed = 0;
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= state.size || nc < 0 || nc >= state.size) continue;
        const t = board[nr][nc];
        if (t && t.type === 'virus') {
          board[nr][nc] = null;
          state.energy += 8; state.score += 80;
          killed++;
        }
      }
    }
    if (killed === 0) {
      toast('иҢғеӣҙеҶ…ж— з—…жҜ’пјҢе·ІеҸ–ж¶Ҳ');
      cancelSkillMode(); // з©әж”ҫдёҚж¶ҲиҖ—иғҪйҮҸдёҺж¬Ўж•°
    } else {
      toast('жё…йҷӨ ' + killed + ' дёӘз—…жҜ’');
      finishSkill();
    }
  } else if (skillMode === 'mutate') {
    if (!cell || cell.type !== 'creature') { toast('иҜ·йҖүз”ҹзү©'); return; }
    cell.value = cell.value * 2;
    cell.color = 'purple';
    cell.maxHp = computeMaxHp(cell.value, cell.tag);
    cell.hp = cell.maxHp;
    state.score += cell.value;
    findAndQueueEvolutions();
    if (pendingEvolutions.length > 0) {
      showEvolution(() => { finishSkill(); });
    } else {
      finishSkill();
    }
  }
}

function finishSkill() {
  if (skillMode) {
    const skill = SKILLS.find(s => s.key === skillMode);
    if (skill) {
      state.skillUses = state.skillUses || {};
      state.skillUses[skill.key] = (state.skillUses[skill.key] || 0) + 1;
    }
    skillMode = null;
    selectedPalette = null;
    save();
    render();
  }
}

function cancelSkillMode() {
  if (skillMode) {
    const skill = SKILLS.find(s => s.key === skillMode);
    if (skill) {
      const cost = skillCost(skill);
      state.energy += cost; // йҖҖиҝҳиғҪйҮҸ
    }
    skillMode = null;
    selectedPalette = null;
    render();
  }
}

function showShop(onClose) {
  const upgrades = getUpgradeLevels();
  const essence = getEssence();
  let cards = '';
  UPGRADES.forEach(u => {
    const lvl = upgrades[u.key] || 0;
    const maxed = lvl >= u.maxLevel;
    const canBuy = !maxed && essence >= u.cost;
    cards +=
      '<div class="shop-card">' +
        '<div class="icon">' + u.icon + '</div>' +
        '<div class="info">' +
          '<div class="name">' + u.name + '</div>' +
          '<div class="desc">' + u.desc + '</div>' +
          '<div class="lvl">зӯүзә§ ' + lvl + ' / ' + u.maxLevel + '</div>' +
        '</div>' +
        (maxed
          ? '<button class="btn" disabled>е·Іж»Ўзә§</button>'
          : '<button class="btn ' + (canBuy ? '' : 'disabled') + '" data-buy="' + u.key + '" ' + (canBuy ? '' : 'disabled') + '>рҹ’Һ' + u.cost + '</button>') +
      '</div>';
  });
  const html =
    '<h2>ж ·жң¬е•Ҷеә—</h2>' +
    '<p>з”ЁеҸҳејӮж ·жң¬ж°ёд№…ејәеҢ–ж–№иҲҹиғҪеҠӣпјҲжҜҸзә§жҲҗжң¬еӣәе®ҡпјү</p>' +
    '<div class="stat-row"><span>ж ·жң¬дҪҷйўқ</span><span class="v">рҹ’Һ ' + essence + '</span></div>' +
    cards +
    '<div class="modal-actions"><button class="btn secondary" id="btnCloseShop">е…ій—ӯ</button></div>';
  showModal(html, () => {
    document.querySelectorAll('[data-buy]').forEach(b => {
      b.onclick = () => {
        const key = b.getAttribute('data-buy');
        const u = UPGRADES.find(x => x.key === key);
        const cur = getUpgradeLevels();
        const lvl = cur[key] || 0;
        if (lvl >= u.maxLevel) return;
        if (getEssence() < u.cost) { toast('ж ·жң¬дёҚи¶і'); return; }
        addEssence(-u.cost);
        cur[key] = lvl + 1;
        localStorage.setItem('ark_mut_upgrades', JSON.stringify(cur));
        showShop(onClose); // еҲ·ж–°
      };
    });
    document.getElementById('btnCloseShop').onclick = () => { onClose(); };
  });
}

// еҪ“еүҚз”ҹж•Ҳзҡ„йҡҫеәҰ/жЈӢзӣҳпјҲstate дјҳе…ҲпјҢеӣһйҖҖеҲ°иҸңеҚ•йҖүйЎ№пјҢдҝқиҜҒиҸңеҚ•дёӢд№ҹиғҪжҹҘзңӢжҺ’иЎҢжҰңпјү
function currentDiff() { return state ? state.difficulty : menuDifficulty; }
function currentSize() { return state ? state.size : menuSize; }

function lbKey() { return 'ark_mut_lb_' + currentDiff() + '_' + currentSize(); }

function getLeaderboard() {
  try {
    const raw = localStorage.getItem(lbKey());
    if (!raw) return [];
    return JSON.parse(raw);
  } catch (e) { return []; }
}

function submitLeaderboard(name, score, zones) {
  const list = getLeaderboard();
  const now = new Date();
  const date = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
  const time = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  list.push({ name: name, score: score, zones: zones, date: date, time: time });
  list.sort((a, b) => b.score - a.score);
  const top = list.slice(0, 10);
  localStorage.setItem(lbKey(), JSON.stringify(top));
}

function showLeaderboard(onClose) {
  const list = getLeaderboard();
  let rows = '';
  if (list.length === 0) {
    rows = '<p style="color:var(--muted);padding:20px 0;">жҡӮж— и®°еҪ•пјҢеҺ»еҮҖеҢ–з¬¬дёҖдёӘжұЎжҹ“еҢәеҗ§пјҒ</p>';
  } else {
    rows = list.map((e, i) =>
      '<div class="lb-row">' +
        '<span class="rank">' + (i + 1) + '</span>' +
        '<span class="nm">' + escapeHtml(e.name) + ' В· ' + e.zones + 'еҢә В· ' + e.date + '</span>' +
        '<span class="sc">' + e.score + '</span>' +
      '</div>'
    ).join('');
  }
  const html =
    '<h2>жҺ’иЎҢжҰң</h2>' +
    '<p style="font-size:12px;">йҡҫеәҰпјҡ' + ({easy:'иҪ»жқҫ',normal:'жҷ®йҖҡ',hard:'еӣ°йҡҫ'}[currentDiff()]) + ' В· жЈӢзӣҳпјҡ' + currentSize() + 'Г—' + currentSize() + '</p>' +
    rows +
    '<div class="modal-actions"><button class="btn secondary" id="btnCloseLB">е…ій—ӯ</button></div>';
  showModal(html, () => {
    document.getElementById('btnCloseLB').onclick = () => { onClose(); };
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

/* ---------- еӯҳжЎЈ ---------- */

function save() {
  try {
    localStorage.setItem('ark_mut_save', JSON.stringify({
      state: state,
      board: board,
      size: state.size,
      difficulty: state.difficulty,
      zoneIndex: state.zoneIndex
    }));
  } catch (e) {}
}

function clearSave() {
  localStorage.removeItem('ark_mut_save');
}

function loadProgress() {
  try {
    const raw = localStorage.getItem('ark_mut_save');
    if (!raw) return false;
    const data = JSON.parse(raw);
    state = data.state;
    state.size = data.size;
    state.difficulty = data.difficulty;
    state.zoneIndex = data.zoneIndex;
    board = data.board;
    // йҮҚе»ә currentLevel дёҺ breedTask.check
    state.currentLevel = generateLevel(state.zoneIndex);
    if (data.state.currentLevel && data.state.currentLevel.tasks) {
      // жҒўеӨҚд»»еҠЎе®ҢжҲҗзҠ¶жҖҒ
      state.currentLevel.tasks = data.state.currentLevel.tasks;
    }
    // йҮҚз®— cellIdCounter
    let maxId = 0;
    for (let r = 0; r < state.size; r++)
      for (let c = 0; c < state.size; c++)
        if (board[r][c] && board[r][c].id > maxId) maxId = board[r][c].id;
    cellIdCounter = maxId;
    pendingEvolutions = [];
    evolutionOfferedIds = new Set();
    skillMode = null;
    // дҝқиҜҒйҮҚиҜ•жүҖйңҖеӯ—ж®өжңүй»ҳи®ӨеҖјпјҲж—§еӯҳжЎЈеҸҜиғҪзјәеӨұпјү
    if (typeof state.levelStartScore !== 'number') state.levelStartScore = state.score;
    if (typeof state.levelStartEnergy !== 'number') state.levelStartEnergy = state.energy;
    // иӢҘеӯҳжЎЈеӨ„дәҺжёёжҲҸз»“жқҹзҠ¶жҖҒпјҢзӣҙжҺҘжё…жЎЈйҒҝе…ҚеҠ иҪҪжӯ»еұҖ
    if (isGameOver()) { clearSave(); return false; }
    return true;
  } catch (e) { return false; }
}

/* ---------- жёІжҹ“ ---------- */

function render() {
  renderHUD();
  renderTasks();
  renderWave();
  renderBoard();
  renderSkills();
  renderSkillHint();
}

function renderHUD() {
  document.getElementById('hudScore').textContent = state.score;
  document.getElementById('hudEnergy').textContent = state.energy;
  document.getElementById('hudZone').textContent = (state.zoneIndex + 1) + '/8';
  document.getElementById('hudDiff').textContent = { easy: 'иҪ»жқҫ', normal: 'жҷ®йҖҡ', hard: 'еӣ°йҡҫ' }[state.difficulty];
  document.getElementById('zoneName').textContent = 'жұЎжҹ“еҢә ' + ZONE_NAMES[state.zoneIndex];
}

function renderTasks() {
  const html = state.tasks.map(t =>
    '<div class="task-row ' + (t.done ? 'done' : '') + '">' +
      '<span class="dot"></span><span>' + t.label + '</span>' +
    '</div>'
  ).join('');
  document.getElementById('taskPanel').innerHTML = html;
}

function renderWave() {
  const target = state.currentLevel.waveTarget;
  const cur = state.wavesSurvived;
  document.getElementById('waveText').textContent = cur + ' / ' + target;
  document.getElementById('waveFill').style.width = Math.min(100, (cur / target) * 100) + '%';
}

function renderBoard() {
  const el = document.getElementById('board');
  el.style.gridTemplateColumns = 'repeat(' + state.size + ', 1fr)';
  let html = '';
  const foresee = hasForeseeCell();
  const nextPos = state.nextVirusPos;
  for (let r = 0; r < state.size; r++) {
    for (let c = 0; c < state.size; c++) {
      const cell = board[r][c];
      let cls = 'cell';
      let inner = '';
      if (!cell) {
        // з©әж јпјҡж Үи®°йў„иЁҖдҪҚзҪ®
        if (foresee && nextPos && nextPos[0] === r && nextPos[1] === c) {
          cls += ' next-virus';
          inner = '<span style="color:var(--danger);font-size:18px;">вҳЈ</span>';
        }
      } else if (cell.type === 'virus') {
        cls += ' tile-virus';
        inner = '<span class="tag">вҳЈ</span>' +
          '<span class="v">з—…жҜ’</span>' +
          '<span class="hp" style="color:var(--danger);">' + cell.hp + '</span>';
      } else {
        cls += ' ' + (COLOR_TILE_CLASS[cell.color] || 'tile-purple');
        if (skillMode && isSkillTarget(cell, r, c)) cls += ' selectable';
        inner = '';
        if (cell.tag) {
          const evoIcon = getTagIcon(cell.tag);
          inner += '<span class="tag">' + evoIcon + '</span>';
        }
        inner += '<span class="v">' + cell.value + '</span>';
        inner += '<span class="name">' + speciesName(cell.value) + '</span>';
        inner += '<span class="hp">вҷҘ' + cell.hp + '</span>';
      }
      html += '<div class="' + cls + '" data-r="' + r + '" data-c="' + c + '">' + inner + '</div>';
    }
  }
  el.innerHTML = html;
  // з»‘е®ҡзӮ№еҮ»
  el.querySelectorAll('.cell').forEach(div => {
    div.onclick = () => {
      const r = parseInt(div.getAttribute('data-r'), 10);
      const c = parseInt(div.getAttribute('data-c'), 10);
      onCellClick(r, c);
    };
  });
}

function isSkillTarget(cell, r, c) {
  if (skillMode === 'edit' || skillMode === 'mutate') return cell && cell.type === 'creature';
  if (skillMode === 'split') return cell && cell.type === 'creature' && cell.value >= 8;
  if (skillMode === 'antibody') return true; // д»»ж„Ҹж ј
  return false;
}

function getTagIcon(tag) {
  const map = {
    flame: 'рҹ”Ҙ', attack: 'вҡ”пёҸ', tree: 'рҹҢі', fungus: 'рҹҚ„',
    shield: 'рҹӣЎпёҸ', medicine: 'рҹ’Ҡ', energy: 'вҡЎ', light: 'вҳҖпёҸ',
    chaos: 'рҹҢҖ', foresee: 'рҹ‘ҒпёҸ'
  };
  return map[tag] || '';
}

function renderSkills() {
  const el = document.getElementById('skills');
  el.innerHTML = SKILLS.map(s => {
    const cost = skillCost(s);
    const cant = state.energy < cost;
    const active = skillMode === s.key;
    return '<div class="skill-card ' + (active ? 'active' : '') + (cant && !active ? ' disabled' : '') + '" data-skill="' + s.key + '">' +
      '<div class="icon">' + s.icon + '</div>' +
      '<div class="name">' + s.name + '</div>' +
      '<div class="cost ' + (cant ? 'cant' : '') + '">' + cost + ' иғҪ</div>' +
    '</div>';
  }).join('');
  el.querySelectorAll('.skill-card').forEach(div => {
    div.onclick = () => {
      const key = div.getAttribute('data-skill');
      onSkillClick(key);
    };
  });
}

function renderSkillHint() {
  const el = document.getElementById('skillHint');
  if (skillMode) {
    const s = SKILLS.find(x => x.key === skillMode);
    el.textContent = 'жҠҖиғҪжЁЎејҸпјҡ' + s.name + ' вҖ” ' + s.desc + 'пјҲEscеҸ–ж¶Ҳпјү';
  } else {
    el.textContent = '';
  }
}

/* ---------- иҫ“е…ҘжҺ§еҲ¶ ---------- */

function handleKey(e) {
  const key = e.key;
  if (key === 'Escape') { cancelSkillMode(); return; }
  if (!state) return;
  // д»…еңЁжёёжҲҸи§ҶеӣҫеҸҜи§Ғдё”ж— еј№зӘ—ж—¶е“Қеә”ж–№еҗ‘й”®
  if (document.getElementById('gameView').style.display !== 'block') return;
  if (document.getElementById('modalOverlay').classList.contains('show')) return;
  let dir = null;
  if (key === 'ArrowLeft' || key === 'a' || key === 'A') dir = 'left';
  else if (key === 'ArrowRight' || key === 'd' || key === 'D') dir = 'right';
  else if (key === 'ArrowUp' || key === 'w' || key === 'W') dir = 'up';
  else if (key === 'ArrowDown' || key === 's' || key === 'S') dir = 'down';
  if (dir) { e.preventDefault(); slide(dir); }
}

function handleTouchStart(e) {
  // еј№зӘ—жү“ејҖж—¶дёҚи®°еҪ•ж»‘еҠЁиө·зӮ№пјҲдёҺй”®зӣҳдёҖиҮҙпјү
  if (document.getElementById('modalOverlay').classList.contains('show')) return;
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}

function handleTouchEnd(e) {
  if (!touchStart || !state) return;
  // еј№зӘ—жү“ејҖж—¶дёҚе“Қеә”ж»‘еҠЁ
  if (document.getElementById('modalOverlay').classList.contains('show')) { touchStart = null; return; }
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)) slide(dx > 0 ? 'right' : 'left');
  else slide(dy > 0 ? 'down' : 'up');
}

/* ---------- дә‘еҗҢжӯҘпјҲGitHub Gistпјү ---------- */
// е…ій”®е®үе…ЁиҜҙжҳҺпјҡ
// 1. Token еӯҳеӮЁеңЁ sessionStorageпјҲе…ій—ӯйЎөйқўиҮӘеҠЁжё…з©әпјүпјҢйҒҝе…Қй•ҝжңҹй©»з•ҷ localStorage
// 2. collectCloudData дёҘж јжҺ’йҷӨ token й”®пјҢз»қдёҚеҶҷе…Ҙ Gist
// 3. Gist ID д»Қеӯҳ localStorageпјҲе®ғдёҚжҳҜжңәеҜҶпјүпјҢж–№дҫҝдёӢж¬Ўе®ҡдҪҚеӯҳжЎЈ

const GIST_FILENAME = 'ark_mut_save.json';
const GIST_ID_KEY = 'ark_mut_gist_id';          // йқһжңәеҜҶпјҢеҸҜжҢҒд№…еҢ–
const SHARED_TOKEN_KEY = 'ark_shared_github_token';  // жүҖжңүжёёжҲҸе…ұдә«зҡ„ tokenпјҲз”ұеӨ§еҺ… OAuth зҷ»еҪ•еҗҺеҶҷе…Ҙ sessionStorageпјү

function getGistToken() {
  // иҜ»еҸ–е…ұдә« tokenпјҲз”ұеӨ§еҺ… OAuth зҷ»еҪ•еҗҺеҶҷе…Ҙ sessionStorageпјү
  return sessionStorage.getItem(SHARED_TOKEN_KEY) || '';
}
function getGistId() { return localStorage.getItem(GIST_ID_KEY) || ''; }
function setGistId(id) {
  if (id) localStorage.setItem(GIST_ID_KEY, id);
  else localStorage.removeItem(GIST_ID_KEY);
}

// вҳ… е…ій”®дҝ®еӨҚпјҡж”¶йӣҶдёҠдј ж•°жҚ®ж—¶дёҘж јжҺ’йҷӨ token й”®пјҢйҒҝе…Қ token иў«еҶҷе…Ҙ Gist и§ҰеҸ‘ GitHub иҮӘеҠЁж’Өй”Җ
function collectCloudData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k) continue;
    if (k.indexOf('ark_mut_') !== 0) continue;
    // дёҘж јжҺ’йҷӨ gist_idпјҲдёҚдёҠдј пјҢйҒҝе…ҚиҰҶзӣ–дә‘з«Ҝе…¶д»–еӯҳжЎЈпјү
    if (k === GIST_ID_KEY) continue;
    data[k] = localStorage.getItem(k);
  }
  data.__export_time = new Date().toISOString();
  return data;
}

function applyCloudData(data) {
  const keep = [GIST_ID_KEY];
  const toRemove = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.indexOf('ark_mut_') === 0 && keep.indexOf(k) === -1) toRemove.push(k);
  }
  toRemove.forEach(k => localStorage.removeItem(k));
  Object.keys(data).forEach(k => {
    if (k === '__export_time') return;
    if (keep.indexOf(k) !== -1) return;  // дёҚиҰҶзӣ–жң¬ең° gist_id
    localStorage.setItem(k, data[k]);
  });
}

function showCloud(onClose) {
  const token = getGistToken();
  const id = getGistId();
  let html =
    '<div class="help-content">' +
    '<h3>вҳҒпёҸ GitHub дә‘еҗҢжӯҘ</h3>' +
    '<p style="font-size:12px;color:var(--muted);">йҖҡиҝҮ GitHub Gist еӨҮд»Ҫ/жҒўеӨҚжң¬жёёжҲҸзҡ„иҝӣеәҰпјҲеӯҳжЎЈгҖҒеҚҮзә§гҖҒж ·жң¬гҖҒжҺ’иЎҢжҰңпјүгҖӮ</p>';
  if (token) {
    html += '<p style="font-size:12px;color:var(--toxic);">вң… е·ІйҖҡиҝҮеӨ§еҺ…зҷ»еҪ• GitHubпјҢеҸҜзӣҙжҺҘдёҠдј /дёӢиҪҪгҖӮ</p>';
  } else {
    html += '<p style="font-size:12px;color:var(--danger);">вҡ пёҸ е°ҡжңӘзҷ»еҪ• GitHubгҖӮиҜ·е…Ҳиҝ”еӣһ <a href="index.html" style="color:var(--accent-soft);">жёёжҲҸеӨ§еҺ…</a> зӮ№гҖҢвҳҒпёҸ GitHub зҷ»еҪ•гҖҚжҺҲжқғеҗҺеҶҚдҪҝз”Ёдә‘еҗҢжӯҘгҖӮ</p>';
  }
  html += '<h3>еӯҳжЎЈ ID</h3>' +
    '<p style="font-size:12px;color:var(--muted);">' + (id ? 'еҪ“еүҚдә‘з«ҜеӯҳжЎЈIDпјҡ<span style="color:var(--toxic);word-break:break-all;">' + id + '</span>' : 'е°ҡжңӘеҲӣе»әдә‘з«ҜеӯҳжЎЈпјҢзӮ№гҖҢдёҠдј еҲ°дә‘з«ҜгҖҚеҚіеҸҜеҲӣе»әгҖӮ') + '</p>' +
    '</div>' +
    '<div class="modal-actions">' +
      '<button class="btn" id="btnCloudUpload" ' + (token ? '' : 'disabled') + '>в¬ҶпёҸ дёҠдј еҲ°дә‘з«Ҝ</button>' +
      '<button class="btn secondary" id="btnCloudDownload" ' + (token && id ? '' : 'disabled') + '>в¬ҮпёҸ д»Һдә‘з«ҜдёӢиҪҪ</button>' +
    '</div>' +
    '<div class="modal-actions" style="margin-top:10px;">' +
      '<button class="btn ghost" id="btnCloudClear" ' + (token ? '' : 'disabled') + '>жё…з©әеӯҳжЎЈID</button>' +
      '<a class="btn ghost" href="index.html">иҝ”еӣһеӨ§еҺ…</a>' +
      '<button class="btn ghost" id="btnCloudClose">е…ій—ӯ</button>' +
    '</div>' +
    '<div id="cloudStatus" style="margin-top:12px;font-size:12px;color:var(--muted);min-height:18px;"></div>';

  showModal(html, null, true);
  const status = msg => { const el = document.getElementById('cloudStatus'); if (el) el.textContent = msg; };

  document.getElementById('btnCloudClear').onclick = () => {
    setGistId('');
    status('вң… е·Іжё…з©әжң¬ең°еӯҳжЎЈID');
  };
  document.getElementById('btnCloudUpload').onclick = () => uploadCloud(status);
  document.getElementById('btnCloudDownload').onclick = () => downloadCloud(status);
  document.getElementById('btnCloudClose').onclick = () => { closeModal(); if (onClose) onClose(); };
}

function createGist(data, cb) {
  const token = getGistToken();
  if (!token) { cb('жңӘй…ҚзҪ® Token'); return; }
  const xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://api.github.com/gists', true);
  xhr.setRequestHeader('Authorization', 'token ' + token);
  xhr.setRequestHeader('Accept', 'application/vnd.github+json');
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onreadystatechange = function () {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 201) {
      try { cb(null, JSON.parse(xhr.responseText).id); }
      catch (e) { cb('и§Јжһҗе“Қеә”еӨұиҙҘ'); }
    } else {
      cb('HTTP ' + xhr.status + 'пјҡ' + (xhr.responseText || '').slice(0, 200));
    }
  };
  xhr.send(JSON.stringify({
    description: 'зІҫзҒөж–№иҲҹпјҡеҸҳејӮ дә‘еӯҳжЎЈ',
    public: false,
    files: { 'ark_mut_save.json': { content: JSON.stringify(data, null, 2) } }
  }));
}

function updateGist(id, data, cb) {
  const token = getGistToken();
  if (!token) { cb('жңӘй…ҚзҪ® Token'); return; }
  const xhr = new XMLHttpRequest();
  xhr.open('PATCH', 'https://api.github.com/gists/' + id, true);
  xhr.setRequestHeader('Authorization', 'token ' + token);
  xhr.setRequestHeader('Accept', 'application/vnd.github+json');
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onreadystatechange = function () {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) cb(null);
    else if (xhr.status === 401 || xhr.status === 403 || xhr.status === 404) {
      // ж—§ gist дёҚеҸҜи®ҝй—®/дёҚеӯҳеңЁ вҶ’ иҮӘеҠЁж–°е»ә
      setGistId('');
      createGist(data, function (err, newId) {
        if (err) cb('дёҠдј еӨұиҙҘпјҲж–°е»әд№ҹеӨұиҙҘпјүпјҡ' + err);
        else { setGistId(newId); cb(null); }
      });
    } else {
      cb('HTTP ' + xhr.status + 'пјҡ' + (xhr.responseText || '').slice(0, 200));
    }
  };
  xhr.send(JSON.stringify({
    description: 'зІҫзҒөж–№иҲҹпјҡеҸҳејӮ дә‘еӯҳжЎЈ',
    files: { 'ark_mut_save.json': { content: JSON.stringify(data, null, 2) } }
  }));
}

function fetchGist(id, cb) {
  const token = getGistToken();
  if (!token) { cb('жңӘй…ҚзҪ® Token'); return; }
  const xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.github.com/gists/' + id, true);
  xhr.setRequestHeader('Authorization', 'token ' + token);
  xhr.setRequestHeader('Accept', 'application/vnd.github+json');
  xhr.onreadystatechange = function () {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) {
      try {
        const f = JSON.parse(xhr.responseText).files[GIST_FILENAME];
        if (!f) { cb('еӯҳжЎЈж–Үд»¶дёҚеӯҳеңЁ'); return; }
        cb(null, JSON.parse(f.content));
      } catch (e) { cb('и§ЈжһҗеӯҳжЎЈеӨұиҙҘпјҡ' + e.message); }
    } else if (xhr.status === 401 || xhr.status === 403) {
      setGistId('');
      let msg = 'вқҢ Token ж— жқғи®ҝй—®жӯӨеӯҳжЎЈпјҲHTTP ' + xhr.status + 'пјүгҖӮ';
      msg += 'еҸҜиғҪеҺҹеӣ пјҡв‘  Token еӨұж•Ҳпјӣв‘Ў Gist жҳҜз”Ёж—§ Token еҲӣе»әзҡ„пјҢж–° Token ж— жқғи®ҝй—®гҖӮ';
      msg += 'е·Іжё…з©әжң¬ең°еӯҳжЎЈIDпјҢиҜ·зӮ№гҖҢдёҠдј еҲ°дә‘з«ҜгҖҚеҲӣе»әж–°еӯҳжЎЈгҖӮ';
      cb(msg);
    } else if (xhr.status === 404) {
      setGistId('');
      cb('дә‘з«ҜеӯҳжЎЈдёҚеӯҳеңЁпјҲеҸҜиғҪе·ІеҲ йҷӨпјүгҖӮе·Іжё…з©әеӯҳжЎЈIDпјҢиҜ·йҮҚж–°дёҠдј гҖӮ');
    } else {
      cb('HTTP ' + xhr.status + 'пјҡ' + (xhr.responseText || '').slice(0, 200));
    }
  };
  xhr.send();
}

function uploadCloud(status) {
  const token = getGistToken();
  if (!token) { status('вқҢ иҜ·е…Ҳй…ҚзҪ® Token е№¶зӮ№гҖҢдҝқеӯҳTokenгҖҚ'); return; }
  status('вҸі дёҠдј дёӯ...');
  const data = collectCloudData();
  const id = getGistId();
  if (id) {
    updateGist(id, data, err => {
      if (err) status('вқҢ ' + err);
      else status('вң… е·Іжӣҙж–°дә‘з«ҜеӯҳжЎЈпјҲ' + new Date().toLocaleTimeString() + 'пјү');
    });
  } else {
    createGist(data, (err, newId) => {
      if (err) status('вқҢ ' + err);
      else { setGistId(newId); status('вң… е·ІеҲӣе»әдә‘з«ҜеӯҳжЎЈпјҢIDпјҡ' + newId); }
    });
  }
}

function downloadCloud(status) {
  const token = getGistToken();
  if (!token) { status('вқҢ иҜ·е…Ҳй…ҚзҪ® Token е№¶зӮ№гҖҢдҝқеӯҳTokenгҖҚ'); return; }
  const id = getGistId();
  if (!id) { status('вқҢ е°ҡж— дә‘з«ҜеӯҳжЎЈIDпјҢиҜ·е…ҲгҖҢдёҠдј еҲ°дә‘з«ҜгҖҚ'); return; }
  status('вҸі дёӢиҪҪдёӯ...');
  fetchGist(id, (err, data) => {
    if (err) { status('вқҢ ' + err); return; }
    try {
      applyCloudData(data);
      status('вң… е·ІжҒўеӨҚдә‘з«ҜеӯҳжЎЈпјҲ' + (data.__export_time || 'жңӘзҹҘж—¶й—ҙ') + 'пјүгҖӮиҜ·йҮҚж–°иҝӣе…Ҙдё»иҸңеҚ•жҲ–еҲ·ж–°йЎөйқўз”ҹж•ҲгҖӮ');
      setTimeout(() => { closeModal(); location.reload(); }, 1500);
    } catch (e) {
      status('вқҢ еә”з”ЁеӯҳжЎЈеӨұиҙҘпјҡ' + e.message);
    }
  });
}

function initMenu() {

  // жЈӢзӣҳеӨ§е°ҸйҖүйЎ№
  document.querySelectorAll('#sizeOptions .option-btn').forEach(b => {

      document.querySelectorAll('#sizeOptions .option-btn').forEach(x => x.classList.remove('selected'));

    showHelp(() => closeModal());
  };
  document.getElementById('btnLB').onclick = () => {
    showLeaderboard(() => closeModal());
  };
  document.getElementById('btnShop').onclick = () => {
    showShop(() => closeModal());
  };
  document.getElementById('btnCloud').onclick = () => {
    showCloud(() => closeModal());
  };

  // жёёжҲҸеҶ…жҢүй’®
  document.getElementById('btnRestart').onclick = () => {
    if (confirm('зЎ®е®ҡйҮҚеҗҜеҪ“еүҚеҢәеҹҹпјҹиҝӣеәҰе°ҶеӣһеҲ°жң¬еҢәејҖе§Ӣж—¶пјҲдёҚжё…з©әеӯҳжЎЈпјүгҖӮ')) {
      retryLevel();
    }
  };
  document.getElementById('btnMenu').onclick = () => {
    if (confirm('иҝ”еӣһдё»иҸңеҚ•пјҹеҪ“еүҚиҝӣеәҰе·ІиҮӘеҠЁдҝқеӯҳгҖӮ')) showMenu();
  };
  document.getElementById('btnHelp2').onclick = () => showHelp(() => closeModal());
  document.getElementById('btnCloud2').onclick = () => {
    showCloud(() => closeModal());
  };

  // й”®зӣҳ
  document.addEventListener('keydown', handleKey);
  // и§ҰеұҸ
  const boardEl = document.getElementById('board');
  boardEl.addEventListener('touchstart', handleTouchStart, { passive: true });
  boardEl.addEventListener('touchend', handleTouchEnd, { passive: true });

  // зӮ№еҮ»йҒ®зҪ©е…ій—ӯеј№зӘ—пјҲд»…йқһејәеҲ¶еј№зӘ—пјҡеё®еҠ©/жҺ’иЎҢжҰң/е•Ҷеә—пјү
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target.id === 'modalOverlay' && !modalForce) closeModal();
  });

  showMenu();
}

// еҗҜеҠЁ
initMenu();
</script>
