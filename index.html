<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>精灵方舟：进化</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;800&family=Noto+Sans+SC:wght@400;500;700&display=swap');

    :root {
      --bg: #1b2a1b;
      --panel: #243824;
      --panel-light: #2f452f;
      --text: #f3f9e8;
      --muted: #a8c6a8;
      --accent: #9ef916;
      --accent-soft: #b9ff66;
      --danger: #ff4d6d;
      --gold: #ffd166;
      --soil: #d4a373;
      --barren: #8d7f78;
      --water: #4cc9f0;
      --nest: #e9c46a;
      --sanctuary: #f4d35e;
      --tile-normal: #e9edc9;
      --radius: 14px;
      --shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(158,249,22,0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(76,201,240,0.08) 0%, transparent 40%),
        var(--bg);
      color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      overflow: hidden;
    }

    h1, h2, h3 { font-family: 'Noto Serif SC', serif; margin: 0; }

    /* 顶部栏 */
    .topbar {
      width: min(520px, 96vw);
      margin-top: 10px;
      display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
    }
    .title-group h1 { font-size: 22px; letter-spacing: 1px; color: var(--accent-soft); }
    .title-group p { margin: 2px 0 0; font-size: 12px; color: var(--muted); }
    .top-actions { display: flex; gap: 8px; }
    .btn-icon {
      background: var(--panel); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); border-radius: 10px; width: 36px; height: 36px;
      display: grid; place-items: center; cursor: pointer; font-size: 16px;
      transition: transform .1s, background .2s;
    }
    .btn-icon:hover { background: var(--panel-light); }
    .btn-icon:active { transform: scale(0.94); }

    /* 分数/能量 */
    .hud {
      width: min(520px, 96vw);
      margin: 10px 0;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .hud-card {
      background: var(--panel); border-radius: var(--radius);
      padding: 10px 12px; text-align: center; box-shadow: var(--shadow);
    }
    .hud-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .hud-card .value { font-size: 20px; font-weight: 700; margin-top: 2px; }

    /* 任务面板 */
    .mission-panel {
      width: min(520px, 96vw);
      background: rgba(36,56,36,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      transition: max-height .25s ease;
    }
    .mission-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; cursor: pointer;
    }
    .mission-title { font-size: 14px; color: var(--gold); font-weight: 700; }
    .mission-toggle { font-size: 12px; color: var(--muted); }
    .mission-list { padding: 0 14px 12px; }
    .mission-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 5px 0; }
    .mission-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--muted); display: grid; place-items: center; font-size: 11px; }
    .mission-item.done { color: var(--accent-soft); }
    .mission-item.done .mission-check { border-color: var(--accent-soft); background: var(--accent-soft); color: #1b2a1b; }

    /* 腐化进度条 */
    .corruption-bar-wrap {
      width: min(520px, 96vw); margin-bottom: 10px;
    }
    .corruption-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--danger); margin-bottom: 4px; }
    .corruption-track {
      height: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden;
    }
    .corruption-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #ff758f, var(--danger));
      transition: width .25s ease;
    }

    /* 棋盘 */
    .board-wrap {
      position: relative;
      width: min(520px, 96vw); aspect-ratio: 1;
      background: rgba(0,0,0,0.25);
      border-radius: 20px; padding: 10px;
      box-shadow: var(--shadow);
      touch-action: none;
    }
    .board {
      width: 100%; height: 100%;
      display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px;
    }
    .cell {
      position: relative;
      border-radius: 12px;
      display: grid; place-items: center;
      overflow: hidden;
      transition: background .2s;
    }
    .cell.terrain-soil { background: var(--soil); }
    .cell.terrain-barren {
      background: repeating-linear-gradient(45deg, var(--barren), var(--barren) 6px, #7a6e68 6px, #7a6e68 12px);
      box-shadow: inset 0 0 18px rgba(0,0,0,0.35);
    }
    .cell.terrain-water {
      background: linear-gradient(135deg, var(--water), #277da1);
      opacity: 0.95;
    }
    .cell.terrain-nest { background: var(--nest); }
    .cell.terrain-sanctuary {
      background: radial-gradient(circle at 30% 30%, #fff4bd, var(--sanctuary));
      box-shadow: inset 0 0 22px rgba(255,255,255,0.35);
    }
    .cell.terrain-barren::after,
    .cell.terrain-water::after,
    .cell.terrain-nest::after,
    .cell.terrain-sanctuary::after {
      position: absolute; font-size: 18px; opacity: 0.55; pointer-events: none;
    }
    .cell.terrain-barren::after { content: '🏜️'; }
    .cell.terrain-water::after { content: '💧'; }
    .cell.terrain-nest::after { content: '🪺'; }
    .cell.terrain-sanctuary::after { content: '✨'; }

    .cell.choosable { cursor: pointer; box-shadow: inset 0 0 0 3px var(--accent); }
    .cell.choosable:hover { filter: brightness(1.15); }

    .tile {
      width: 88%; height: 88%;
      border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-weight: 800;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform .12s, opacity .12s;
      z-index: 2;
    }
    .tile-pop { animation: pop .18s ease; }
    @keyframes pop {
      0% { transform: scale(0.6); }
      70% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .tile-icon { font-size: 28px; line-height: 1; }
    .tile-value { font-size: 12px; opacity: 0.85; }
    .tile-corrupted {
      background: linear-gradient(135deg, #6a040f, #9d0208);
      color: #fff;
      border: 2px solid #ff4d6d;
      box-shadow: 0 0 16px rgba(255,77,109,0.55);
    }
    .tile-hp {
      position: absolute; bottom: 4px; right: 4px;
      font-size: 10px; color: var(--danger); background: rgba(0,0,0,0.45);
      padding: 1px 4px; border-radius: 4px;
    }

    /* 精灵技能面板 */
    .spirit-panel {
      width: min(520px, 96vw);
      margin-top: 12px;
      background: var(--panel); border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .spirit-row { display: flex; gap: 10px; overflow-x: auto; }
    .spirit-card {
      flex: 1; min-width: 110px;
      background: var(--panel-light); border-radius: 12px;
      padding: 10px; text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform .1s, border-color .2s;
      cursor: pointer;
    }
    .spirit-card.disabled { opacity: 0.45; cursor: not-allowed; }
    .spirit-card.active { border-color: var(--accent); box-shadow: 0 0 12px rgba(158,249,22,0.18); }
    .spirit-card .avatar { font-size: 28px; }
    .spirit-card .name { font-size: 12px; font-weight: 700; margin-top: 4px; }
    .spirit-card .cost { font-size: 11px; color: var(--accent-soft); margin-top: 2px; }
    .spirit-card .uses { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* 遮罩与结算 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(10,18,10,0.92);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100;
      padding: 24px; text-align: center;
    }
    .overlay.show { display: flex; }
    .burst-anim {
      font-size: 72px; animation: rise 1.4s ease-in-out;
    }
    @keyframes rise {
      0% { transform: translateY(40px) scale(0.6); opacity: 0; }
      40% { transform: translateY(-10px) scale(1.1); opacity: 1; }
      100% { transform: translateY(-60px) scale(1); opacity: 0; }
    }
    .score-board { margin-top: 20px; }
    .score-big { font-size: 56px; font-weight: 800; color: var(--accent-soft); }
    .score-label { font-size: 14px; color: var(--muted); }
    .reward-list { margin: 18px 0; font-size: 15px; line-height: 1.8; }
    .btn {
      background: linear-gradient(135deg, var(--accent), #76c300);
      border: none; border-radius: 12px; padding: 12px 28px;
      font-size: 15px; font-weight: 700; color: #153000; cursor: pointer;
      box-shadow: 0 6px 16px rgba(158,249,22,0.25);
      transition: transform .1s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn.secondary { background: var(--panel-light); color: var(--text); box-shadow: none; margin-left: 10px; }

    .toast {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: var(--panel-light); color: var(--text);
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: opacity .2s;
      z-index: 200;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      .title-group h1 { font-size: 18px; }
      .tile-icon { font-size: 22px; }
      .tile-value { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title-group">
      <h1>精灵方舟：进化</h1>
      <p id="regionName">晨曦林地</p>
    </div>
    <div class="top-actions">
      <button class="btn-icon" id="btnRestart" title="重新开始">↺</button>
      <button class="btn-icon" id="btnSettings" title="设置">⚙️</button>
    </div>
  </div>

  <div class="hud">
    <div class="hud-card"><div class="label">生态分</div><div class="value" id="score">0</div></div>
    <div class="hud-card"><div class="label">自然之力</div><div class="value" id="energy">0</div></div>
    <div class="hud-card"><div class="label">区域</div><div class="value" id="level">1</div></div>
  </div>

  <div class="mission-panel" id="missionPanel">
    <div class="mission-header" id="missionHeader">
      <span class="mission-title">🌿 生态任务</span>
      <span class="mission-toggle" id="missionToggle">收起 ▲</span>
    </div>
    <div class="mission-list" id="missionList"></div>
  </div>

  <div class="corruption-bar-wrap">
    <div class="corruption-label"><span>腐化侵蚀</span><span id="corruptionText">0%</span></div>
    <div class="corruption-track"><div class="corruption-fill" id="corruptionFill"></div></div>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div class="board" id="board"></div>
  </div>

  <div class="spirit-panel">
    <div class="spirit-row" id="spiritRow"></div>
  </div>

  <div class="overlay" id="settlementOverlay">
    <div class="burst-anim" id="burstAnim">🐉</div>
    <h2 id="settlementTitle">区域复苏成功！</h2>
    <div class="score-board">
      <div class="score-label">最终生态得分</div>
      <div class="score-big" id="finalScore">0</div>
    </div>
    <div class="reward-list" id="rewardList"></div>
    <div>
      <button class="btn" id="btnNext">下一区域</button>
      <button class="btn secondary" id="btnRetry">再试一次</button>
    </div>
  </div>

  <div class="overlay" id="gameoverOverlay">
    <h2>生态系统崩溃</h2>
    <p style="color:var(--muted); margin:12px 0;">腐化淹没了这片土地……</p>
    <button class="btn" id="btnOverRetry">重新开始</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ========================= 配置表 =========================
    const CONFIG = {
      boardSize: 4,
      baseSpawn: [2, 4],
      spawnFourChance: 0.1,
      corruptionBase: 3,
      corruptionBlockedExtra: 10,
      corruptionMax: 100,
      energyMax: 100,
      enableCorruption: true,
      enableSpirits: true,
      enableNests: true,
      enableSanctuary: true,
      barrenCleanseLevel: 16, // 合并出 >=16 可净化相邻荒地
      nestSpawnDivisor: 16,
    };

    const SPECIES = {
      2: { name: '水滴', icon: '💧', color: '#a5d8ff', text: '#1a3c5a' },
      4: { name: '种子', icon: '🌰', color: '#b5e48c', text: '#2a4018' },
      8: { name: '幼苗', icon: '🌱', color: '#99d98c', text: '#1e3a18' },
      16: { name: '灌木', icon: '🌿', color: '#76c893', text: '#123421' },
      32: { name: '树木', icon: '🌳', color: '#52b69a', text: '#0b2e25' },
      64: { name: '鹿', icon: '🦌', color: '#d4a373', text: '#3d2310' },
      128: { name: '狼', icon: '🐺', color: '#a8a6a4', text: '#222' },
      256: { name: '熊', icon: '🐻', color: '#bc6c25', text: '#2a1605' },
      512: { name: '精灵石', icon: '💎', color: '#9d4edd', text: '#fff' },
      1024: { name: '守护巨龙', icon: '🐉', color: '#ff9e00', text: '#2a1600' },
    };
    const MAX_SPECIES_VALUE = 1024;

    const TERRAINS = {
      soil: { name: '沃土', passable: true, occupiable: true },
      barren: { name: '荒地', passable: true, occupiable: false },
      water: { name: '水源', passable: false, occupiable: false },
      nest: { name: '巢穴', passable: true, occupiable: true },
      sanctuary: { name: '圣地', passable: true, occupiable: true },
    };

    const SPIRITS = [
      {
        id: 'purifier', name: '腐化克星', icon: '✨',
        skill: { name: '净化之光', baseCost: 30, desc: '引爆一格，净化周围3x3荒地并升级其中方块' },
        target: 'cell'
      },
      {
        id: 'architect', name: '生态建筑师', icon: '🛠️',
        skill: { name: '筑巢', baseCost: 25, desc: '选择一个动物，将其格变为巢穴并立即繁衍' },
        target: 'animal'
      },
      {
        id: 'chain', name: '链式反应者', icon: '⚡',
        skill: { name: '共生爆发', baseCost: 40, desc: '选择两个相邻且差2级内的植物/动物，合成高级生物' },
        target: 'pair'
      },
    ];

    const LEVELS = [
      {
        name: '晨曦林地',
        terrains: [
          { r: 0, c: 1, t: 'barren' },
          { r: 1, c: 1, t: 'barren' },
          { r: 2, c: 2, t: 'barren' },
        ],
        tasks: [
          { type: 'cleanse_barren', count: 3 },
          { type: 'coexist', species: [16, 64] },
        ],
        initialTiles: [{ r: 0, c: 0, v: 2 }, { r: 3, c: 3, v: 2 }],
      },
      {
        name: '迷雾沼泽',
        terrains: [
          { r: 1, c: 1, t: 'water' },
          { r: 1, c: 2, t: 'water' },
          { r: 2, c: 1, t: 'barren' },
          { r: 2, c: 2, t: 'nest' },
          { r: 3, c: 0, t: 'barren' },
        ],
        tasks: [
          { type: 'cleanse_barren', count: 2 },
          { type: 'coexist', species: [32, 128] },
        ],
        initialTiles: [{ r: 0, c: 0, v: 4 }, { r: 0, c: 3, v: 4 }, { r: 3, c: 3, v: 2 }],
      },
      {
        name: '圣山遗迹',
        terrains: [
          { r: 0, c: 0, t: 'sanctuary' },
          { r: 3, c: 3, t: 'sanctuary' },
          { r: 1, c: 2, t: 'water' },
          { r: 2, c: 1, t: 'water' },
          { r: 1, c: 1, t: 'barren' },
          { r: 2, c: 2, t: 'barren' },
        ],
        tasks: [
          { type: 'cleanse_barren', count: 2 },
          { type: 'coexist', species: [256, 512] },
        ],
        initialTiles: [{ r: 0, c: 3, v: 8 }, { r: 3, c: 0, v: 8 }, { r: 1, c: 0, v: 2 }],
      },
    ];

    // ========================= 状态 =========================
    let state = {};
    let skillMode = null; // { spiritId, target, step, first }

    // ========================= 初始化 =========================
    function initState() {
      return {
        board: [],
        score: 0,
        energy: 0,
        corruption: 0,
        levelIndex: 0,
        gameOver: false,
        victory: false,
        cleansedBarren: 0,
        initialBarren: 0,
        nestQueue: [],
        spiritUses: Object.fromEntries(SPIRITS.map(s => [s.id, 0])),
        tasks: [],
      };
    }

    function createCell(value = 0, terrain = 'soil', type = 'normal') {
      return {
        value,
        type,
        terrain,
        tempTimer: 0,
        sanctuaryUsed: false,
      };
    }

    function loadLevel(index) {
      state = initState();
      state.levelIndex = index % LEVELS.length;
      const lvl = LEVELS[state.levelIndex];
      // 初始化棋盘
      for (let r = 0; r < CONFIG.boardSize; r++) {
        for (let c = 0; c < CONFIG.boardSize; c++) {
          state.board.push(createCell(0, 'soil'));
        }
      }
      // 地形
      for (const t of lvl.terrains || []) {
        const cell = getCell(t.r, t.c);
        cell.terrain = t.t;
        if (t.t === 'barren') state.initialBarren++;
      }
      // 初始方块
      for (const tile of lvl.initialTiles || []) {
        const cell = getCell(tile.r, tile.c);
        cell.value = tile.v;
        cell.type = 'normal';
      }
      // 任务
      state.tasks = (lvl.tasks || []).map(t => ({ ...t, done: false }));
      document.getElementById('regionName').textContent = lvl.name;
      document.getElementById('level').textContent = state.levelIndex + 1;
      updateMissionPanel();
      render();
    }

    function getCell(r, c) {
      if (r < 0 || r >= CONFIG.boardSize || c < 0 || c >= CONFIG.boardSize) return null;
      return state.board[r * CONFIG.boardSize + c];
    }

    function inBounds(r, c) {
      return r >= 0 && r < CONFIG.boardSize && c >= 0 && c < CONFIG.boardSize;
    }

    function isOccupiable(cell) {
      if (!cell) return false;
      if (cell.type === 'corrupted' || cell.type === 'blocked_terrain') return false;
      return TERRAINS[cell.terrain].occupiable;
    }

    function isPassable(cell) {
      if (!cell) return false;
      if (cell.type === 'corrupted' || cell.type === 'blocked_terrain') return false;
      return TERRAINS[cell.terrain].passable;
    }

    function clearTile(cell) {
      cell.value = 0;
      cell.type = 'normal';
    }

    function getSpecies(value) {
      let v = value;
      if (v > MAX_SPECIES_VALUE) v = MAX_SPECIES_VALUE;
      return SPECIES[v] || SPECIES[2];
    }

    function boardMaxValue() {
      let max = 2;
      for (const cell of state.board) {
        if (cell.value > max && cell.type === 'normal') max = cell.value;
      }
      return max;
    }

    // ========================= 渲染 =========================
    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      for (let r = 0; r < CONFIG.boardSize; r++) {
        for (let c = 0; c < CONFIG.boardSize; c++) {
          const cell = getCell(r, c);
          const div = document.createElement('div');
          div.className = `cell terrain-${cell.terrain}`;
          div.dataset.r = r; div.dataset.c = c;
          if (skillMode) div.classList.add('choosable');
          div.addEventListener('click', () => onCellClick(r, c));

          if (cell.value > 0) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            if (cell.type === 'corrupted') {
              tile.classList.add('tile-corrupted');
              tile.innerHTML = `<div class="tile-icon">☠️</div><div class="tile-value">${cell.value}</div><div class="tile-hp">HP ${cell.hp || 1}</div>`;
            } else {
              const s = getSpecies(cell.value);
              tile.style.background = s.color;
              tile.style.color = s.text;
              tile.innerHTML = `<div class="tile-icon">${s.icon}</div><div class="tile-value">${cell.value}</div>`;
              tile.classList.add('tile-pop');
            }
            div.appendChild(tile);
          }
          boardEl.appendChild(div);
        }
      }
      document.getElementById('score').textContent = state.score;
      document.getElementById('energy').textContent = Math.floor(state.energy);
      const corrPct = Math.min(100, Math.floor((state.corruption / CONFIG.corruptionMax) * 100));
      document.getElementById('corruptionFill').style.width = corrPct + '%';
      document.getElementById('corruptionText').textContent = corrPct + '%';
      renderSpirits();
      updateMissionPanel();
    }

    function updateMissionPanel() {
      const list = document.getElementById('missionList');
      list.innerHTML = '';
      for (const task of state.tasks) {
        const div = document.createElement('div');
        div.className = 'mission-item' + (task.done ? ' done' : '');
        let text = '';
        if (task.type === 'cleanse_barren') text = `净化 ${task.count} 块荒地（${Math.min(state.cleansedBarren, task.count)}/${task.count}）`;
        else if (task.type === 'coexist') text = `使 ${task.species.map(v => getSpecies(v).name).join('、')} 同时存在`;
        div.innerHTML = `<div class="mission-check">${task.done ? '✓' : ''}</div><span>${text}</span>`;
        list.appendChild(div);
      }
    }

    function renderSpirits() {
      const row = document.getElementById('spiritRow');
      row.innerHTML = '';
      for (const s of SPIRITS) {
        const uses = state.spiritUses[s.id] || 0;
        const cost = s.skill.baseCost * Math.pow(2, uses);
        const disabled = !CONFIG.enableSpirits || state.energy < cost || state.gameOver || state.victory;
        const card = document.createElement('div');
        card.className = 'spirit-card' + (disabled ? ' disabled' : '') + (skillMode && skillMode.spiritId === s.id ? ' active' : '');
        card.innerHTML = `
          <div class="avatar">${s.icon}</div>
          <div class="name">${s.name}</div>
          <div class="cost">${s.skill.name} ${cost}⚡</div>
          <div class="uses">已用 ${uses} 次</div>
        `;
        card.title = s.skill.desc;
        card.addEventListener('click', () => onSpiritClick(s));
        row.appendChild(card);
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    // ========================= 移动与合并 =========================
    function getLines(direction) {
      const lines = [];
      if (direction === 'left' || direction === 'right') {
        for (let r = 0; r < CONFIG.boardSize; r++) {
          const line = [];
          for (let c = 0; c < CONFIG.boardSize; c++) line.push({ r, c, cell: getCell(r, c) });
          if (direction === 'right') line.reverse();
          lines.push(line);
        }
      } else {
        for (let c = 0; c < CONFIG.boardSize; c++) {
          const line = [];
          for (let r = 0; r < CONFIG.boardSize; r++) line.push({ r, c, cell: getCell(r, c) });
          if (direction === 'down') line.reverse();
          lines.push(line);
        }
      }
      return lines;
    }

    function move(direction) {
      if (state.gameOver || state.victory) return;
      const lines = getLines(direction);
      let moved = false;
      let mergedAny = false;
      let scoreGain = 0;
      const mergeEvents = [];
      const preMax = boardMaxValue();

      for (const line of lines) {
        const occupiable = line.filter(pos => isOccupiable(pos.cell));
        const originals = occupiable
          .map((pos, idx) => ({ pos, idx, value: pos.cell.value, type: pos.cell.type }))
          .filter(o => o.value > 0);
        // 清空可停留格上的旧方块
        occupiable.forEach(pos => clearTile(pos.cell));
        const slots = occupiable.map(pos => ({ pos, filled: false, merged: false, value: 0 }));

        for (const orig of originals) {
          let placed = false;
          for (const slot of slots) {
            if (!slot.filled) {
              slot.value = orig.value;
              slot.filled = true;
              slot.pos.cell.value = orig.value;
              slot.pos.cell.type = orig.type;
              if (slot.pos.cell !== orig.pos.cell) moved = true;
              placed = true;
              break;
            }
            // 可合并：同值、普通方块、目标未合并过
            if (slot.value === orig.value && !slot.merged && orig.type === 'normal' && slot.pos.cell.type === 'normal') {
              const newValue = orig.value * 2;
              slot.value = newValue;
              slot.merged = true;
              slot.pos.cell.value = newValue;
              scoreGain += newValue;
              mergeEvents.push({ r: slot.pos.r, c: slot.pos.c, value: newValue });
              moved = true;
              mergedAny = true;
              placed = true;
              break;
            }
          }
          if (!placed) {
            // 理论上不会发生：如果未放置，则放回原位
            orig.pos.cell.value = orig.value;
            orig.pos.cell.type = orig.type;
          }
        }
      }

      // 能量：按合并值 / 本回合最大方块分配
      if (mergedAny && preMax > 0) {
        const totalMerged = mergeEvents.reduce((a, e) => a + e.value, 0);
        state.energy = Math.min(CONFIG.energyMax, state.energy + totalMerged / preMax);
      }
      state.score += scoreGain;

      afterMove({ moved, mergedAny, mergeEvents });
    }

    function afterMove({ moved, mergedAny, mergeEvents }) {
      // 1. 合并净化荒地
      for (const ev of mergeEvents) {
        if (ev.value >= CONFIG.barrenCleanseLevel) {
          cleanseAdjacentBarren(ev.r, ev.c);
        }
      }

      // 2. 地形互动
      handleTerrainInteractions();

      // 3. 腐化行动
      if (CONFIG.enableCorruption) {
        handleCorruptionActions();
      }

      // 4. 执行巢穴预定生成
      executeNestSpawns();

      // 5. 临时地形倒计时
      decayTempTerrains();

      // 6. 腐化进度
      updateCorruption(moved, mergedAny);

      // 7. 胜利检测
      if (checkTasks()) {
        triggerVictory();
        render();
        return;
      }

      // 8. 生成新方块
      if (moved) {
        spawnTile();
      }

      // 9. 失败检测
      if (!hasAnyMove()) {
        triggerGameOver();
      }

      render();
    }

    function cleanseAdjacentBarren(r, c) {
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr, dc] of dirs) {
        const cell = getCell(r + dr, c + dc);
        if (cell && cell.terrain === 'barren') {
          cell.terrain = 'soil';
          cell.tempTimer = 0;
          state.cleansedBarren++;
        }
      }
    }

    function handleTerrainInteractions() {
      for (let r = 0; r < CONFIG.boardSize; r++) {
        for (let c = 0; c < CONFIG.boardSize; c++) {
          const cell = getCell(r, c);
          if (!cell) continue;
          // 巢穴：有动物则下回合生成幼体
          if (CONFIG.enableNests && cell.terrain === 'nest' && cell.value >= 64 && cell.type === 'normal') {
            const already = state.nestQueue.some(q => q.r === r && q.c === c);
            if (!already) {
              const spawnValue = Math.max(4, Math.floor(cell.value / CONFIG.nestSpawnDivisor));
              state.nestQueue.push({ r, c, value: spawnValue });
            }
          }
          // 圣地：高级生物触发全屏低等级跃升
          if (CONFIG.enableSanctuary && cell.terrain === 'sanctuary' && cell.value >= 256 && cell.type === 'normal' && !cell.sanctuaryUsed) {
            cell.sanctuaryUsed = true;
            for (const other of state.board) {
              if (other.value > 0 && other.value <= 8 && other.type === 'normal') {
                other.value = Math.min(MAX_SPECIES_VALUE, other.value * 4);
              }
            }
            showToast('圣地觉醒：低阶生命获得进化！');
          }
        }
      }
    }

    function handleCorruptionActions() {
      const corrupted = state.board.filter(cell => cell.type === 'corrupted');
      for (const cell of corrupted) {
        const r = state.board.indexOf(cell) / CONFIG.boardSize | 0; // 需要坐标
        // 用辅助函数取坐标
        const idx = state.board.indexOf(cell);
        const cr = (idx / CONFIG.boardSize) | 0;
        const cc = idx % CONFIG.boardSize;

        // 降低相邻正常方块一级
        const neighbors = [];
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        for (const [dr, dc] of dirs) {
          const nb = getCell(cr + dr, cc + dc);
          if (nb && nb.value > 0 && nb.type === 'normal') neighbors.push(nb);
        }
        if (neighbors.length) {
          const target = neighbors[Math.floor(Math.random() * neighbors.length)];
          target.value = target.value > 2 ? target.value / 2 : 0;
          if (target.value === 0) target.type = 'normal';
        }

        // 向相邻空格传播临时荒地
        const empties = [];
        for (const [dr, dc] of dirs) {
          const nb = getCell(cr + dr, cc + dc);
          if (nb && nb.value === 0 && isOccupiable(nb)) empties.push(nb);
        }
        if (empties.length) {
          const target = empties[Math.floor(Math.random() * empties.length)];
          target.terrain = 'barren';
          target.tempTimer = 3;
        }
      }
    }

    function executeNestSpawns() {
      const queue = state.nestQueue;
      state.nestQueue = [];
      for (const q of queue) {
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        const empties = [];
        for (const [dr, dc] of dirs) {
          const cell = getCell(q.r + dr, q.c + dc);
          if (cell && cell.value === 0 && isOccupiable(cell)) empties.push(cell);
        }
        if (empties.length) {
          const target = empties[Math.floor(Math.random() * empties.length)];
          target.value = q.value;
          target.type = 'normal';
        }
      }
    }

    function decayTempTerrains() {
      for (const cell of state.board) {
        if (cell.tempTimer > 0) {
          cell.tempTimer--;
          if (cell.tempTimer === 0 && cell.terrain === 'barren') {
            cell.terrain = 'soil';
          }
        }
      }
    }

    function updateCorruption(moved, mergedAny) {
      if (!CONFIG.enableCorruption) return;
      let inc = CONFIG.corruptionBase;
      if (!moved && !mergedAny) inc += CONFIG.corruptionBlockedExtra;
      state.corruption = Math.min(CONFIG.corruptionMax, state.corruption + inc);
      if (state.corruption >= CONFIG.corruptionMax) {
        state.corruption = 0;
        spawnCorruptedSeed();
      }
    }

    function spawnCorruptedSeed() {
      const empties = state.board.filter(cell => cell.value === 0 && isOccupiable(cell));
      if (!empties.length) return;
      const cell = empties[Math.floor(Math.random() * empties.length)];
      const values = state.board.filter(c => c.value > 0 && c.type === 'normal').map(c => c.value);
      let x = 2;
      if (values.length) {
        values.sort((a, b) => a - b);
        const mid = values[Math.floor(values.length / 2)];
        x = nearestPowerOfTwo(mid);
      }
      cell.value = x;
      cell.type = 'corrupted';
      cell.hp = 2;
      showToast('腐化之种降临！');
    }

    function nearestPowerOfTwo(n) {
      const log = Math.round(Math.log2(n));
      const clamped = Math.max(1, Math.min(log, 10));
      return Math.pow(2, clamped);
    }

    function spawnTile() {
      const empties = state.board.filter(cell => cell.value === 0 && isOccupiable(cell));
      if (!empties.length) return;
      const cell = empties[Math.floor(Math.random() * empties.length)];
      const v = Math.random() < CONFIG.spawnFourChance ? 4 : 2;
      cell.value = v;
      cell.type = 'normal';
    }

    function hasAnyMove() {
      // 检查是否存在可移动或可合并
      for (let r = 0; r < CONFIG.boardSize; r++) {
        for (let c = 0; c < CONFIG.boardSize; c++) {
          const cell = getCell(r, c);
          if (!cell) continue;
          if (cell.value === 0 && isOccupiable(cell)) return true;
          if (cell.value > 0 && cell.type === 'normal') {
            const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
            for (const [dr, dc] of dirs) {
              const nb = getCell(r + dr, c + dc);
              if (nb && nb.value === cell.value && nb.type === 'normal') return true;
            }
          }
        }
      }
      return false;
    }

    // ========================= 任务与结算 =========================
    function checkTasks() {
      for (const task of state.tasks) {
        if (task.type === 'cleanse_barren') {
          task.done = state.cleansedBarren >= task.count;
        } else if (task.type === 'coexist') {
          task.done = task.species.every(v => state.board.some(c => c.value === v && c.type === 'normal'));
        }
      }
      return state.tasks.every(t => t.done);
    }

    function triggerVictory() {
      state.victory = true;
      let ecoScore = 0;
      for (const cell of state.board) {
        if (cell.value > 0 && cell.type === 'normal') ecoScore += cell.value;
      }
      ecoScore = ecoScore * 10 + state.score;
      const essence = Math.floor(ecoScore / 1000);
      document.getElementById('finalScore').textContent = ecoScore;
      document.getElementById('rewardList').innerHTML = `
        <div>获得自然精华 × ${essence}</div>
        <div>剩余能量 ${Math.floor(state.energy)} 已转化为生态分</div>
      `;
      document.getElementById('settlementOverlay').classList.add('show');
    }

    function triggerGameOver() {
      state.gameOver = true;
      document.getElementById('gameoverOverlay').classList.add('show');
    }

    // ========================= 精灵技能 =========================
    function onSpiritClick(spirit) {
      if (!CONFIG.enableSpirits || state.gameOver || state.victory) return;
      const uses = state.spiritUses[spirit.id] || 0;
      const cost = spirit.skill.baseCost * Math.pow(2, uses);
      if (state.energy < cost) {
        showToast('自然之力不足');
        return;
      }
      skillMode = { spiritId: spirit.id, target: spirit.target, step: 1, first: null };
      showToast(`请选择目标：${spirit.skill.name}`);
      render();
    }

    function cancelSkillMode() {
      skillMode = null;
      render();
    }

    function onCellClick(r, c) {
      if (!skillMode) return;
      const spirit = SPIRITS.find(s => s.id === skillMode.spiritId);
      if (!spirit) return;
      const cell = getCell(r, c);

      if (skillMode.target === 'cell') {
        // 净化之光：以目标格为中心净化3x3荒地并升级其中方块
        const dirs3 = [-1, 0, 1];
        for (const dr of dirs3) {
          for (const dc of dirs3) {
            const tc = getCell(r + dr, c + dc);
            if (!tc) continue;
            if (tc.terrain === 'barren') {
              tc.terrain = 'soil';
              tc.tempTimer = 0;
              state.cleansedBarren++;
            }
            if (tc.value > 0 && tc.type === 'normal' && tc.value < MAX_SPECIES_VALUE) {
              tc.value = Math.min(MAX_SPECIES_VALUE, tc.value * 2);
            }
          }
        }
        spendSkill(spirit);
        afterSkill();
      } else if (skillMode.target === 'animal') {
        if (cell.value >= 64 && cell.type === 'normal') {
          cell.terrain = 'nest';
          const spawnValue = Math.max(4, Math.floor(cell.value / CONFIG.nestSpawnDivisor));
          const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
          const empties = [];
          for (const [dr, dc] of dirs) {
            const nb = getCell(r + dr, c + dc);
            if (nb && nb.value === 0 && isOccupiable(nb)) empties.push(nb);
          }
          if (empties.length) {
            const t = empties[Math.floor(Math.random() * empties.length)];
            t.value = spawnValue;
            t.type = 'normal';
          }
          spendSkill(spirit);
          afterSkill();
        } else {
          showToast('请选择一个动物方块（≥64）');
        }
      } else if (skillMode.target === 'pair') {
        if (skillMode.step === 1) {
          if (cell.value > 0 && cell.type === 'normal' && cell.value >= 16) {
            skillMode.first = { r, c };
            skillMode.step = 2;
            showToast('请选择相邻的另一个植物或动物');
            render();
          } else {
            showToast('请选择一个植物或动物方块（≥16）');
          }
        } else {
          const first = getCell(skillMode.first.r, skillMode.first.c);
          const second = cell;
          const dr = Math.abs(r - skillMode.first.r);
          const dc = Math.abs(c - skillMode.first.c);
          const adjacent = (dr === 1 && dc === 0) || (dr === 0 && dc === 1);
          const ratio = Math.max(first.value, second.value) / Math.min(first.value, second.value);
          const valid = adjacent && first.value > 0 && second.value > 0 && first.type === 'normal' && second.type === 'normal' && first.value >= 16 && second.value >= 16 && ratio <= 4 && first.value !== second.value;
          if (valid) {
            const newValue = Math.min(MAX_SPECIES_VALUE, Math.max(first.value, second.value) * 4);
            first.value = newValue;
            clearTile(second);
            // 检查合并后是否净化相邻荒地
            if (newValue >= CONFIG.barrenCleanseLevel) {
              cleanseAdjacentBarren(skillMode.first.r, skillMode.first.c);
            }
            spendSkill(spirit);
            afterSkill();
          } else {
            showToast('目标不合法：需相邻、差2级内、不同物种且≥16');
          }
        }
      }
    }

    function spendSkill(spirit) {
      const uses = state.spiritUses[spirit.id] || 0;
      const cost = spirit.skill.baseCost * Math.pow(2, uses);
      state.energy -= cost;
      state.spiritUses[spirit.id] = uses + 1;
    }

    function afterSkill() {
      skillMode = null;
      // 技能视为一次“回合”，触发腐化、任务检测等
      if (CONFIG.enableCorruption) {
        handleCorruptionActions();
      }
      executeNestSpawns();
      decayTempTerrains();
      updateCorruption(true, false);
      if (checkTasks()) {
        triggerVictory();
      } else if (!hasAnyMove()) {
        triggerGameOver();
      }
      render();
    }

    // ========================= 输入 =========================
    function setupInput() {
      document.addEventListener('keydown', (e) => {
        if (skillMode) {
          if (e.key === 'Escape') cancelSkillMode();
          return;
        }
        switch (e.key) {
          case 'ArrowUp': case 'w': case 'W': move('up'); break;
          case 'ArrowDown': case 's': case 'S': move('down'); break;
          case 'ArrowLeft': case 'a': case 'A': move('left'); break;
          case 'ArrowRight': case 'd': case 'D': move('right'); break;
        }
      });

      const wrap = document.getElementById('boardWrap');
      let sx, sy;
      wrap.addEventListener('touchstart', (e) => {
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
      }, { passive: true });
      wrap.addEventListener('touchend', (e) => {
        if (skillMode) { cancelSkillMode(); return; }
        const ex = e.changedTouches[0].clientX;
        const ey = e.changedTouches[0].clientY;
        const dx = ex - sx, dy = ey - sy;
        const minSwipe = 30;
        if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
        else move(dy > 0 ? 'down' : 'up');
      }, { passive: true });

      document.getElementById('btnRestart').addEventListener('click', () => loadLevel(state.levelIndex));
      document.getElementById('btnSettings').addEventListener('click', () => {
        // 简单切换腐化开关作为演示
        CONFIG.enableCorruption = !CONFIG.enableCorruption;
        showToast(CONFIG.enableCorruption ? '腐化系统：开启' : '腐化系统：关闭');
        render();
      });
      document.getElementById('btnNext').addEventListener('click', () => {
        document.getElementById('settlementOverlay').classList.remove('show');
        loadLevel(state.levelIndex + 1);
      });
      document.getElementById('btnRetry').addEventListener('click', () => {
        document.getElementById('settlementOverlay').classList.remove('show');
        loadLevel(state.levelIndex);
      });
      document.getElementById('btnOverRetry').addEventListener('click', () => {
        document.getElementById('gameoverOverlay').classList.remove('show');
        loadLevel(state.levelIndex);
      });
      document.getElementById('missionHeader').addEventListener('click', () => {
        const p = document.getElementById('missionPanel');
        const t = document.getElementById('missionToggle');
        const list = document.getElementById('missionList');
        if (list.style.display === 'none') {
          list.style.display = 'block';
          t.textContent = '收起 ▲';
        } else {
          list.style.display = 'none';
          t.textContent = '展开 ▼';
        }
      });
    }

    // ========================= 启动 =========================
    setupInput();
    loadLevel(0);
  </script>
</body>
