<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>精灵方舟 · 游戏大厅</title>
  <style>
    :root {
      --bg: #0f0a1f;
      --panel: #1a1330;
      --panel-light: #241a3a;
      --text: #f3e8ff;
      --muted: #b8a8d8;
      --accent: #b026ff;
      --accent-soft: #d96eff;
      --gold: #ffd166;
      --toxic: #9ef916;
      --danger: #ff3d7f;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(176,38,255,0.18) 0%, transparent 42%),
        radial-gradient(circle at 82% 88%, rgba(217,110,255,0.14) 0%, transparent 42%),
        var(--bg);
      color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px 48px;
    }
    .header { text-align: center; margin-bottom: 28px; }
    .header h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 900;
      letter-spacing: 2px;
      margin: 0;
      background: linear-gradient(135deg, var(--accent-soft), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p { margin: 8px 0 0; color: var(--muted); font-size: 14px; letter-spacing: 4px; }
    .games-grid {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }
    .game-card {
      position: relative;
      background: var(--panel);
      border-radius: 18px;
      padding: 22px 20px;
      cursor: pointer;
      border: 1px solid rgba(217,110,255,0.15);
      overflow: hidden;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      text-decoration: none;
      color: inherit;
      display: flex; flex-direction: column;
      min-height: 180px;
    }
    .game-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--card-color, var(--accent)) 0%, transparent 60%);
      opacity: 0.12;
      pointer-events: none;
    }
    .game-card:hover {
      transform: translateY(-4px);
      border-color: var(--card-color, var(--accent));
      box-shadow: 0 12px 28px rgba(0,0,0,0.45), 0 0 18px var(--card-color, var(--accent));
    }
    .game-card:active { transform: translateY(-1px); }
    .game-icon { font-size: 48px; line-height: 1; margin-bottom: 12px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
    .game-title { font-size: 20px; font-weight: 800; margin: 0 0 4px; color: var(--card-color, var(--accent-soft)); }
    .game-subtitle { font-size: 12px; color: var(--muted); letter-spacing: 2px; margin: 0 0 12px; }
    .game-desc { font-size: 13px; color: var(--text); opacity: 0.88; line-height: 1.55; flex: 1; }
    .game-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
    .tag { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: rgba(255,255,255,0.08); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }
    .badge-new { position: absolute; top: 14px; right: 14px; background: var(--danger); color: #fff; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 8px; letter-spacing: 1px; }
    .footer { margin-top: 40px; text-align: center; color: var(--muted); font-size: 12px; line-height: 1.7; }
    .footer a { color: var(--accent-soft); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 600px) { .games-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>精灵方舟 · 游戏大厅</h1>
    <p>GAME HALL</p>
  </div>
  <div class="games-grid" id="gamesGrid"></div>
  <div class="footer">
    <div>所有游戏均可在浏览器中直接游玩，进度自动保存到本地。</div>
    <div style="margin-top:6px;">
      <a href="https://github.com/1847531284/game2048" target="_blank" rel="noopener">GitHub 仓库</a> · 持续更新中
    </div>
  </div>
  <script>
    // ===== 游戏列表（新增游戏只需在此添加一项） =====
    const GAMES = [
      {
        title: '精灵方舟：变异',
        subtitle: 'SPIRIT ARK · MUTATION',
        icon: '🧬',
        desc: '紫色变异主题2048。双属性方块（等级+基因色），配对表合并（红+蓝→紫），病毒入侵系统，5色10种分化分支，4技能，8污染区冒险。',
        url: 'spirit_mut.html',
        color: '#b026ff',
        tags: ['双属性', '配对合并', '病毒系统', '分化分支'],
        isNew: true
      },
      {
        title: '精灵方舟：进化',
        subtitle: 'SPIRIT ARK · EVOLUTION',
        icon: '🌿',
        desc: '绿色生态主题2048。净化腐化之地，培育生物进化链，从DNA到生态系统的方舟复苏之旅。',
        url: 'spirit_evo.html',
        color: '#9ef916',
        tags: ['生态', '腐化净化', '进化链'],
        isNew: false
      },
      {
        title: '经典 2048',
        subtitle: 'CLASSIC 2048',
        icon: '🔢',
        desc: '原版 2048 玩法，合并相同数字方块，挑战 2048 方块。简洁纯粹的数字合并乐趣。',
        url: 'classic2048.html',
        color: '#ffd166',
        tags: ['经典', '数字合并'],
        isNew: false
      }
    ];
    const grid = document.getElementById('gamesGrid');
    GAMES.forEach(g => {
      const card = document.createElement('a');
      card.className = 'game-card';
      card.href = g.url;
      card.style.setProperty('--card-color', g.color);
      card.innerHTML =
        (g.isNew ? '<span class="badge-new">NEW</span>' : '') +
        '<div class="game-icon">' + g.icon + '</div>' +
        '<h2 class="game-title">' + g.title + '</h2>' +
        '<div class="game-subtitle">' + g.subtitle + '</div>' +
        '<p class="game-desc">' + g.desc + '</p>' +
        '<div class="game-tags">' + g.tags.map(t => '<span class="tag">' + t + '</span>').join('') + '</div>';
      grid.appendChild(card);
    });
  </script>
</body>
</html>
